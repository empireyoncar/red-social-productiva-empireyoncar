<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupos - Empireyoncar Social</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        :root { --brand:#1a73e8; --brand-dark:#155fc0; --bg:#eef5ff; --panel:#fff; --line:#d8e5fb; --text:#233247; --muted:#697b96; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Segoe UI", Arial, sans-serif; background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%); color:var(--text); }
        .navbar { width:100%; background:var(--brand); padding:12px 20px; color:white; display:flex; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
        .logo { font-size:20px; font-weight:bold; }
        .nav-links { margin-left:40px; display:flex; gap:18px; flex-wrap:wrap; }
        .nav-links a { color:white; text-decoration:none; font-weight:500; }
        .page { max-width:1180px; margin:28px auto; padding:0 20px 30px; }
        .hero { display:grid; grid-template-columns:1.2fr 0.8fr; gap:20px; margin-bottom:22px; }
        .panel, .group-card { background:var(--panel); border-radius:16px; box-shadow:0 8px 24px rgba(20,57,110,0.10); }
        .panel { padding:22px; }
        h1, h2, h3 { margin:0; }
        .hero p, .group-body p { color:var(--muted); line-height:1.5; }
        .hero p { margin:10px 0 18px; }
        .search-row, .form-row { display:grid; grid-template-columns:1fr auto; gap:12px; }
        input, textarea { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:12px; font-family:inherit; }
        textarea { min-height:100px; resize:vertical; }
        .btn, .ghost-btn { border:none; border-radius:12px; padding:12px 16px; cursor:pointer; font-family:inherit; font-weight:600; }
        .btn { background:var(--brand); color:#fff; }
        .btn:hover { background:var(--brand-dark); }
        .ghost-btn { background:#edf4ff; color:var(--brand); }
        .side-panel { display:grid; gap:12px; align-content:start; }
        .summary-item { padding:12px; border-radius:12px; background:#f7faff; color:var(--text); }
        .create-group-form { display:none; margin-top:16px; gap:10px; }
        .create-group-form.active { display:grid; }
        .section-head { display:flex; justify-content:space-between; align-items:center; margin:24px 0 12px; }
        .group-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; }
        .group-card { overflow:hidden; }
        .group-cover { height:124px; background:linear-gradient(135deg,#1a73e8,#4ca0ff); background-size:cover; background-position:center; }
        .group-body { padding:16px; display:grid; gap:10px; }
        .group-meta { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); }
        .group-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .empty-state { padding:18px; background:#f7faff; border-radius:14px; color:var(--muted); grid-column:1 / -1; }
        @media (max-width:980px) { .hero,.group-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Empireyoncar Social</div>
        <div class="nav-links">
            <a href="/empireyoncarsocial/home">Inicio</a>
            <a href="/empireyoncarsocial/buscar">Buscar</a>
            <a href="/empireyoncarsocial/perfil">Perfil</a>
            <a href="/empireyoncarsocial/chat">Chat</a>
            <a href="/empireyoncarsocial/notificaciones">Notificaciones</a>
        </div>
    </div>
    <div class="page">
        <div class="hero">
            <section class="panel">
                <h1>Grupos</h1>
                <p id="groupsIntro">Crea y administra tus comunidades. Aqui solo aparecen los grupos que has creado.</p>
                <div class="search-row">
                    <input id="groupSearch" type="text" placeholder="Buscar entre mis grupos">
                    <button class="btn" id="searchGroupsBtn" type="button">Buscar grupos</button>
                </div>
                <form class="create-group-form" id="createGroupForm">
                    <input id="groupName" type="text" placeholder="Nombre del grupo">
                    <textarea id="groupLongDescription" placeholder="Descripcion del grupo"></textarea>
                    <input id="groupRules" type="text" placeholder="Reglas del grupo">
                    <input id="groupCategory" type="text" placeholder="Categoria">
                    <input id="groupTags" type="text" placeholder="Etiquetas separadas por coma">
                    <button class="btn" type="submit">Crear grupo</button>
                </form>
            </section>
            <aside class="panel side-panel">
                <h2>Acciones</h2>
                <button class="btn" id="toggleCreateGroup" type="button">Crear grupo</button>
                <button class="ghost-btn" id="showMineBtn" type="button">Ver mis grupos</button>
                <div class="summary-item" id="groupsSummary">Mis grupos: 0</div>
                <div class="summary-item">Solo se listan grupos creados por ti.</div>
            </aside>
        </div>
        <div class="section-head">
            <h2 id="groupsHeading">Mis grupos</h2>
            <button class="ghost-btn" id="resetGroupsBtn" type="button">Mostrar todos</button>
        </div>
        <div class="group-grid" id="groupsGrid"></div>
    </div>
    <script>
        const currentUserId = Number(localStorage.getItem("user_id") || 1);
        let currentUserName = localStorage.getItem("user_name") || "";
        let currentUserIsPlatformAdmin = false;

        const defaultGroups = [
            {
                id: "g1",
                nombre: "Productividad diaria",
                descripcion: "Grupo para organizar rutinas, compartir herramientas y avanzar con enfoque.",
                descripcion_larga: "Comunidad para compartir sistemas de trabajo, seguimiento de metas y recursos para organizar el dia a dia.",
                reglas: "Respeto, aportes utiles, no spam",
                categoria: "Productividad",
                etiquetas: ["productividad", "habitos", "organizacion"],
                fecha_creacion: "2026-05-01",
                creador_id: currentUserId,
                creador: currentUserName,
                admins: [currentUserName],
                banner: "",
                members: [{ id: currentUserId, nombre: currentUserName, role: "admin" }],
                solicitudes: [{ id: 2001, nombre: "Ana Torres", motivo: "Quiero aprender de la comunidad." }],
                posts: [],
                mio: true,
                miembros: 1,
                estado: "Activo"
            }
        ];

        function getDisplayName() {
            const first = (localStorage.getItem("user_first_name") || "").trim();
            const last = (localStorage.getItem("user_last_name") || "").trim();
            const combined = `${first} ${last}`.trim();
            return combined || currentUserName || "Administrador";
        }

        async function hydrateCurrentUserName() {
            if (!currentUserId) return;
            try {
                const response = await fetch(`/empireyoncarsocial/usuarios/api/perfil/${currentUserId}`);
                if (!response.ok) return;
                const user = await response.json();
                const first = (user.nombres || "").trim();
                const last = (user.apellidos || "").trim();
                const combined = `${first} ${last}`.trim();
                if (first) localStorage.setItem("user_first_name", first);
                if (last) localStorage.setItem("user_last_name", last);
                if (combined) {
                    localStorage.setItem("user_name", combined);
                    currentUserName = combined;
                }
                currentUserIsPlatformAdmin = Boolean(user.verificado);
            } catch {}
        }

        function migrateGroupNames(groups) {
            const displayName = getDisplayName();
            let changed = false;
            groups.forEach((group) => {
                if (Number(group.creador_id) === currentUserId && (!group.creador || group.creador === "Administrador")) {
                    group.creador = displayName;
                    changed = true;
                }
                group.admins = (group.admins || []).map((adminName) => {
                    if (adminName === "Administrador" && Number(group.creador_id) === currentUserId) {
                        changed = true;
                        return displayName;
                    }
                    return adminName;
                });
                (group.members || []).forEach((member) => {
                    if (Number(member.id) === currentUserId && (!member.nombre || member.nombre === "Administrador")) {
                        member.nombre = displayName;
                        changed = true;
                    }
                });
            });
            if (changed) saveGroups(groups);
            return groups;
        }

        function getGroups() {
            const saved = localStorage.getItem("empire_groups");
            const groups = saved ? JSON.parse(saved) : defaultGroups;
            return migrateGroupNames(groups);
        }

        function saveGroups(groups) {
            localStorage.setItem("empire_groups", JSON.stringify(groups));
        }

        function getMyGroups() {
            return getGroups().filter((group) => Number(group.creador_id) === currentUserId || group.mio);
        }

        function canModerateGroup(group) {
            return currentUserIsPlatformAdmin || Number(group.creador_id) === currentUserId;
        }

        function getVisibleGroups() {
            return currentUserIsPlatformAdmin ? getGroups() : getMyGroups();
        }

        function openGroup(groupId, target) {
            window.location.href = `/empireyoncarsocial/grupos/${target}?group_id=${encodeURIComponent(groupId)}`;
        }

        function renderGroups(groups, heading) {
            document.getElementById("groupsHeading").textContent = heading;
            document.getElementById("groupsSummary").textContent = currentUserIsPlatformAdmin
                ? `Grupos visibles: ${getGroups().length}`
                : `Mis grupos: ${getMyGroups().length}`;
            document.getElementById("groupsIntro").textContent = currentUserIsPlatformAdmin
                ? "Como usuario verificado puedes ver y moderar cualquier grupo, incluso si no lo creaste."
                : "Crea y administra tus comunidades. Aqui solo aparecen los grupos que has creado.";
            const grid = document.getElementById("groupsGrid");
            if (!groups.length) {
                grid.innerHTML = `<div class="empty-state">${currentUserIsPlatformAdmin ? "No hay grupos guardados." : "Todavia no has creado grupos."}</div>`;
                return;
            }
            grid.innerHTML = groups.map((group) => `
                <article class="group-card">
                    <div class="group-cover" style="${group.banner ? `background-image:url('${group.banner}');` : ''}"></div>
                    <div class="group-body">
                        <h3>${group.nombre}</h3>
                        <p>${group.descripcion}</p>
                        <div class="group-meta"><span>${group.miembros || (group.members || []).length} miembros</span><span>${group.categoria || group.estado || "Activo"}</span></div>
                        <div class="group-actions">
                            <button class="btn" type="button" data-enter-group="${group.id}">${canModerateGroup(group) || group.mio ? "Entrar" : "Solicitar unirse"}</button>
                            <button class="ghost-btn" type="button" data-members-group="${group.id}">Miembros</button>
                            ${canModerateGroup(group) ? `<button class="ghost-btn" type="button" data-delete-group="${group.id}">Eliminar grupo</button>` : ""}
                        </div>
                    </div>
                </article>
            `).join("");
        }

        document.getElementById("toggleCreateGroup").addEventListener("click", () => {
            document.getElementById("createGroupForm").classList.toggle("active");
        });

        document.getElementById("createGroupForm").addEventListener("submit", (event) => {
            event.preventDefault();
            const nombre = document.getElementById("groupName").value.trim();
            const descripcionLarga = document.getElementById("groupLongDescription").value.trim();
            const reglas = document.getElementById("groupRules").value.trim();
            const categoria = document.getElementById("groupCategory").value.trim();
            const etiquetas = document.getElementById("groupTags").value.split(",").map((item) => item.trim()).filter(Boolean);
            if (!nombre || !descripcionLarga) return;
            const displayName = getDisplayName();
            const groups = getGroups();
            groups.unshift({
                id: `group-${Date.now()}`,
                nombre,
                descripcion: descripcionLarga,
                descripcion_larga: descripcionLarga,
                reglas: reglas || "Respeto, colaboracion y no spam",
                categoria: categoria || "General",
                etiquetas,
                fecha_creacion: new Date().toISOString().slice(0, 10),
                creador_id: currentUserId,
                creador: displayName,
                admins: [displayName],
                banner: "",
                members: [{ id: currentUserId, nombre: displayName, role: "admin" }],
                solicitudes: [],
                posts: [],
                mio: true,
                miembros: 1,
                estado: "Activo"
            });
            saveGroups(groups);
            document.getElementById("createGroupForm").reset();
            document.getElementById("createGroupForm").classList.remove("active");
            renderGroups(getVisibleGroups(), currentUserIsPlatformAdmin ? "Todos los grupos" : "Mis grupos");
        });

        document.getElementById("showMineBtn").addEventListener("click", () => {
            renderGroups(currentUserIsPlatformAdmin ? getGroups() : getMyGroups(), currentUserIsPlatformAdmin ? "Todos los grupos" : "Mis grupos");
        });

        document.getElementById("resetGroupsBtn").addEventListener("click", () => {
            renderGroups(getVisibleGroups(), currentUserIsPlatformAdmin ? "Todos los grupos" : "Mis grupos");
        });

        document.getElementById("searchGroupsBtn").addEventListener("click", () => {
            const term = document.getElementById("groupSearch").value.trim().toLowerCase();
            const groups = getVisibleGroups().filter((group) =>
                group.nombre.toLowerCase().includes(term) ||
                group.descripcion.toLowerCase().includes(term) ||
                (group.categoria || "").toLowerCase().includes(term)
            );
            renderGroups(groups, term ? `Resultados para "${term}"` : currentUserIsPlatformAdmin ? "Todos los grupos" : "Mis grupos");
        });

        document.getElementById("groupSearch").addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                document.getElementById("searchGroupsBtn").click();
            }
        });

        document.getElementById("groupsGrid").addEventListener("click", (event) => {
            const enterButton = event.target.closest("[data-enter-group]");
            if (enterButton) {
                openGroup(enterButton.dataset.enterGroup, "grupo");
                return;
            }
            const membersButton = event.target.closest("[data-members-group]");
            if (membersButton) {
                openGroup(membersButton.dataset.membersGroup, "miembros-grupo");
                return;
            }
            const deleteButton = event.target.closest("[data-delete-group]");
            if (deleteButton) {
                const groups = getGroups();
                const group = groups.find((item) => item.id === deleteButton.dataset.deleteGroup);
                if (!group || !canModerateGroup(group)) return;
                if (!confirm(`Deseas eliminar el grupo "${group.nombre}"?`)) return;
                saveGroups(groups.filter((item) => item.id !== group.id));
                renderGroups(getVisibleGroups(), currentUserIsPlatformAdmin ? "Todos los grupos" : "Mis grupos");
            }
        });

        async function initPage() {
            await hydrateCurrentUserName();
            renderGroups(getVisibleGroups(), currentUserIsPlatformAdmin ? "Todos los grupos" : "Mis grupos");
        }

        initPage();
    </script>
</body>
</html>
