<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupos - Empireyoncar Social</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        :root { --brand:#1a73e8; --brand-dark:#155fc0; --bg:#eef5ff; --panel:#fff; --line:#d8e5fb; --text:#233247; --muted:#697b96; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Segoe UI", Arial, sans-serif; background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%); color:var(--text); }
        .navbar { width:100%; background:var(--brand); padding:12px 20px; color:white; display:flex; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
        .logo { font-size:20px; font-weight:bold; }
        .nav-links { margin-left:40px; display:flex; gap:18px; flex-wrap:wrap; }
        .nav-links a { color:white; text-decoration:none; font-weight:500; }
        .page { max-width:1180px; margin:28px auto; padding:0 20px 30px; }
        .hero { display:grid; grid-template-columns:1.1fr 0.9fr; gap:20px; margin-bottom:20px; }
        .hero-panel, .side-panel, .group-card { background:var(--panel); border-radius:16px; box-shadow:0 8px 24px rgba(20,57,110,0.10); }
        .hero-panel { padding:22px; }
        .hero-panel h1 { margin:0 0 10px; font-size:28px; color:var(--brand); }
        .hero-panel p { margin:0 0 18px; color:var(--muted); line-height:1.5; }
        .search-row { display:grid; grid-template-columns:1fr auto; gap:12px; }
        .search-row input, .create-group-form input, .create-group-form textarea { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:12px; font-family:inherit; }
        .btn, .ghost-btn { border:none; border-radius:12px; padding:12px 16px; cursor:pointer; font-family:inherit; font-weight:600; }
        .btn { background:var(--brand); color:#fff; }
        .btn:hover { background:var(--brand-dark); }
        .ghost-btn { background:#edf4ff; color:var(--brand); }
        .side-panel { padding:20px; display:grid; gap:12px; align-content:start; }
        .summary-item { padding:12px; border-radius:12px; background:#f7faff; color:var(--text); }
        .section-head { display:flex; justify-content:space-between; align-items:center; margin:24px 0 12px; }
        .section-head h2 { margin:0; color:var(--brand); font-size:20px; }
        .group-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; }
        .group-card { overflow:hidden; }
        .group-cover { height:124px; background:linear-gradient(135deg,#1a73e8,#4ca0ff); }
        .group-body { padding:16px; }
        .group-body h3 { margin:0 0 8px; }
        .group-body p { margin:0 0 14px; font-size:14px; color:var(--muted); line-height:1.45; }
        .group-meta { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:14px; }
        .group-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .create-group-form { display:none; margin-top:16px; padding:16px; border-radius:14px; border:1px solid var(--line); background:#f8fbff; gap:10px; }
        .create-group-form.active { display:grid; }
        .create-group-form textarea { min-height:96px; resize:vertical; }
        .empty-state { padding:18px; background:#f7faff; border-radius:14px; color:var(--muted); grid-column:1 / -1; }
        @media (max-width:980px) { .hero,.group-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Empireyoncar Social</div>
        <div class="nav-links">
            <a href="/empireyoncarsocial/home">Inicio</a>
            <a href="/empireyoncarsocial/buscar">Buscar</a>
            <a href="/empireyoncarsocial/perfil">Perfil</a>
            <a href="/empireyoncarsocial/chat">Chat</a>
            <a href="/empireyoncarsocial/notificaciones">Notificaciones</a>
        </div>
    </div>
    <div class="page">
        <div class="hero">
            <section class="hero-panel">
                <h1>Grupos</h1>
                <p>Explora comunidades, vuelve a tus grupos frecuentes y crea uno nuevo para tu equipo, tu proyecto o tu comunidad.</p>
                <div class="search-row">
                    <input id="groupSearch" type="text" placeholder="Buscar grupos por nombre o tema">
                    <button class="btn" id="searchGroupsBtn" type="button">Buscar grupos</button>
                </div>
                <form class="create-group-form" id="createGroupForm">
                    <input id="groupName" type="text" placeholder="Nombre del grupo">
                    <textarea id="groupDescription" placeholder="Describe el objetivo del grupo"></textarea>
                    <button class="btn" type="submit">Crear grupo</button>
                </form>
            </section>
            <aside class="side-panel">
                <h2>Acciones</h2>
                <button class="btn" id="toggleCreateGroup" type="button">Crear grupo</button>
                <button class="ghost-btn" id="showMineBtn" type="button">Ver mis grupos</button>
                <div class="summary-item" id="groupsSummary">Mis grupos: 0</div>
                <div class="summary-item">Solicitudes pendientes: 0</div>
                <div class="summary-item">Temas populares: productividad, negocios, tecnologia</div>
            </aside>
        </div>
        <div class="section-head">
            <h2 id="groupsHeading">Mis grupos</h2>
            <button class="ghost-btn" id="resetGroupsBtn" type="button">Mostrar todos</button>
        </div>
        <div class="group-grid" id="groupsGrid"></div>
    </div>
    <script>
        const defaultGroups = [
            { id: "g1", nombre: "Productividad diaria", descripcion: "Grupo para organizar rutinas, compartir herramientas y avanzar con enfoque.", miembros: 148, estado: "Activo", mio: true },
            { id: "g2", nombre: "Negocios locales", descripcion: "Espacio para conectar emprendedores, ofrecer servicios y colaborar entre negocios.", miembros: 84, estado: "Moderado", mio: true },
            { id: "g3", nombre: "Ideas y lanzamientos", descripcion: "Comparte prototipos, pide feedback y valida ideas con otras personas creadoras.", miembros: 62, estado: "Creciendo", mio: true },
            { id: "g4", nombre: "Marketing de contenidos", descripcion: "Estrategias, herramientas y colaboracion para crecer audiencias con contenido util.", miembros: 210, estado: "Abierto", mio: false },
            { id: "g5", nombre: "Freelancers LATAM", descripcion: "Red para conseguir colaboraciones, resolver dudas y compartir oportunidades.", miembros: 176, estado: "Abierto", mio: false },
            { id: "g6", nombre: "Herramientas no-code", descripcion: "Apps, automatizaciones y demos rapidas para lanzar sin escribir demasiado codigo.", miembros: 129, estado: "Abierto", mio: false }
        ];

        function getGroups() {
            const saved = localStorage.getItem("empire_groups");
            return saved ? JSON.parse(saved) : defaultGroups;
        }

        function saveGroups(groups) {
            localStorage.setItem("empire_groups", JSON.stringify(groups));
        }

        function renderGroups(groups, heading) {
            document.getElementById("groupsHeading").textContent = heading;
            document.getElementById("groupsSummary").textContent = `Mis grupos: ${getGroups().filter((group) => group.mio).length}`;
            const grid = document.getElementById("groupsGrid");
            if (!groups.length) {
                grid.innerHTML = '<div class="empty-state">No hay grupos para mostrar con ese filtro.</div>';
                return;
            }
            grid.innerHTML = groups.map((group) => `
                <article class="group-card">
                    <div class="group-cover"></div>
                    <div class="group-body">
                        <h3>${group.nombre}</h3>
                        <p>${group.descripcion}</p>
                        <div class="group-meta"><span>${group.miembros} miembros</span><span>${group.estado}</span></div>
                        <div class="group-actions">
                            <button class="btn" type="button">${group.mio ? "Entrar" : "Unirme"}</button>
                            <button class="ghost-btn" type="button">Miembros</button>
                        </div>
                    </div>
                </article>
            `).join("");
        }

        document.getElementById("toggleCreateGroup").addEventListener("click", () => {
            document.getElementById("createGroupForm").classList.toggle("active");
        });

        document.getElementById("createGroupForm").addEventListener("submit", (event) => {
            event.preventDefault();
            const nombre = document.getElementById("groupName").value.trim();
            const descripcion = document.getElementById("groupDescription").value.trim();
            if (!nombre || !descripcion) return;
            const groups = getGroups();
            groups.unshift({ id: `custom-${Date.now()}`, nombre, descripcion, miembros: 1, estado: "Nuevo", mio: true });
            saveGroups(groups);
            document.getElementById("createGroupForm").reset();
            document.getElementById("createGroupForm").classList.remove("active");
            renderGroups(groups.filter((group) => group.mio), "Mis grupos");
        });

        document.getElementById("showMineBtn").addEventListener("click", () => {
            renderGroups(getGroups().filter((group) => group.mio), "Mis grupos");
            document.getElementById("groupsGrid").scrollIntoView({ behavior: "smooth", block: "start" });
        });

        document.getElementById("resetGroupsBtn").addEventListener("click", () => {
            renderGroups(getGroups(), "Todos los grupos");
        });

        document.getElementById("searchGroupsBtn").addEventListener("click", () => {
            const term = document.getElementById("groupSearch").value.trim().toLowerCase();
            const groups = getGroups().filter((group) =>
                group.nombre.toLowerCase().includes(term) || group.descripcion.toLowerCase().includes(term)
            );
            renderGroups(groups, term ? `Resultados para "${term}"` : "Todos los grupos");
        });

        document.getElementById("groupSearch").addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                document.getElementById("searchGroupsBtn").click();
            }
        });

        renderGroups(getGroups().filter((group) => group.mio), "Mis grupos");
    </script>
</body>
</html>
