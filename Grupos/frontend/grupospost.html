<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa del grupo</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        :root { --brand:#1a73e8; --brand-dark:#155fc0; --bg:#eef5ff; --panel:#fff; --line:#d8e5fb; --text:#233247; --muted:#697b96; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Segoe UI", Arial, sans-serif; background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%); color:var(--text); }
        .navbar { width:100%; background:var(--brand); padding:12px 20px; color:white; display:flex; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
        .logo { font-size:20px; font-weight:bold; }
        .nav-links { margin-left:40px; display:flex; gap:18px; flex-wrap:wrap; }
        .nav-links a { color:white; text-decoration:none; font-weight:500; }
        .page { max-width:1180px; margin:28px auto; padding:0 20px 30px; display:grid; grid-template-columns:minmax(0,1fr) 300px; gap:20px; }
        .panel, .post-card { background:var(--panel); border-radius:16px; box-shadow:0 8px 24px rgba(20,57,110,0.10); }
        .panel { padding:20px; }
        .banner { height:220px; border-radius:14px; background:linear-gradient(135deg,#1a73e8,#4ca0ff); background-size:cover; background-position:center; margin-bottom:18px; }
        .group-info { display:grid; gap:12px; }
        .group-meta { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
        .meta-box { background:#f7faff; border-radius:12px; padding:12px; }
        .composer textarea, .composer input, .composer textarea, .panel input { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:12px; font-family:inherit; }
        .composer textarea { min-height:120px; resize:vertical; }
        .btn, .ghost-btn { border:none; border-radius:12px; padding:12px 16px; cursor:pointer; font-family:inherit; font-weight:600; text-decoration:none; }
        .btn { background:var(--brand); color:#fff; }
        .ghost-btn { background:#edf4ff; color:var(--brand); }
        .toolbar { display:flex; gap:10px; flex-wrap:wrap; }
        .post-list { display:grid; gap:16px; margin-top:18px; }
        .post-card { padding:18px; }
        .post-author { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
        .avatar { width:44px; height:44px; border-radius:50%; background:#dce7fb; display:grid; place-items:center; font-weight:700; color:var(--brand); }
        .post-time { font-size:12px; color:var(--muted); }
        .post-text { white-space:pre-wrap; line-height:1.5; }
        .post-actions { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
        .sidebar { display:grid; gap:20px; align-content:start; }
        .admin-actions { display:grid; gap:10px; }
        .message { min-height:18px; color:var(--muted); font-size:13px; }
        @media (max-width:980px) { .page,.group-meta { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Empireyoncar Social</div>
        <div class="nav-links">
            <a href="/empireyoncarsocial/grupos/">Grupos</a>
            <a href="/empireyoncarsocial/home">Inicio</a>
            <a href="/empireyoncarsocial/perfil">Perfil</a>
        </div>
    </div>
    <div class="page">
        <div>
            <section class="panel">
                <div class="banner" id="groupBanner"></div>
                <div class="group-info">
                    <h1 id="groupName">Cargando grupo...</h1>
                    <p id="groupShortDescription"></p>
                    <div class="group-meta">
                        <div class="meta-box"><strong>Descripcion larga</strong><div id="groupLongDescription"></div></div>
                        <div class="meta-box"><strong>Reglas del grupo</strong><div id="groupRules"></div></div>
                        <div class="meta-box"><strong>Categoria / etiquetas</strong><div id="groupTags"></div></div>
                        <div class="meta-box"><strong>Fecha y administracion</strong><div id="groupAdminInfo"></div></div>
                    </div>
                </div>
            </section>
            <section class="panel composer" style="margin-top:20px;">
                <h2>Crear post</h2>
                <textarea id="postContent" placeholder="Comparte una idea con la comunidad"></textarea>
                <div class="toolbar" style="margin-top:12px;">
                    <button class="btn" id="publishPostBtn" type="button">Publicar</button>
                    <div class="message" id="postMessage"></div>
                </div>
            </section>
            <div class="post-list" id="postList"></div>
        </div>
        <aside class="sidebar">
            <section class="panel">
                <h2>Miembros</h2>
                <p id="membersSummary">Cargando miembros...</p>
                <a class="btn" id="viewMembersBtn" href="#">Ver todos los miembros</a>
            </section>
            <section class="panel" id="adminPanel" style="display:none;">
                <h2>Zona de administracion</h2>
                <div class="admin-actions">
                    <a class="ghost-btn" id="editGroupBtn" href="#">Editar grupo</a>
                    <a class="ghost-btn" id="viewRequestsBtn" href="#">Ver solicitudes de ingreso</a>
                    <a class="ghost-btn" id="manageMembersBtn" href="#">Expulsar miembros</a>
                    <button class="ghost-btn" id="pinPostBtn" type="button">Fijar publicacion</button>
                    <input id="bannerInput" type="file" accept="image/*">
                </div>
            </section>
        </aside>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const groupId = params.get("group_id");
        const currentUserId = Number(localStorage.getItem("user_id") || 1);
        const currentUserName = localStorage.getItem("user_name") || "Administrador";
        let group = null;

        function getGroups() { return JSON.parse(localStorage.getItem("empire_groups") || "[]"); }
        function saveGroups(groups) { localStorage.setItem("empire_groups", JSON.stringify(groups)); }
        function getGroup() { return getGroups().find((item) => item.id === groupId); }
        function initials(name) { return (name || "U").split(" ").map((part) => part[0]).join("").slice(0, 2).toUpperCase(); }

        function renderGroup() {
            group = getGroup();
            if (!group) {
                document.getElementById("groupName").textContent = "Grupo no encontrado";
                return;
            }
            document.getElementById("groupName").textContent = group.nombre;
            document.getElementById("groupShortDescription").textContent = group.descripcion;
            document.getElementById("groupLongDescription").textContent = group.descripcion_larga || group.descripcion;
            document.getElementById("groupRules").textContent = group.reglas || "Sin reglas definidas.";
            document.getElementById("groupTags").textContent = `${group.categoria || "General"} | ${(group.etiquetas || []).join(", ") || "Sin etiquetas"}`;
            document.getElementById("groupAdminInfo").textContent = `${group.fecha_creacion || "-"} | Creador: ${group.creador || "-"} | Admins: ${(group.admins || []).join(", ")}`;
            document.getElementById("groupBanner").style.backgroundImage = group.banner ? `url('${group.banner}')` : "linear-gradient(135deg,#1a73e8,#4ca0ff)";
            document.getElementById("membersSummary").textContent = `${(group.members || []).length} miembro(s) registrados.`;
            document.getElementById("viewMembersBtn").href = `/empireyoncarsocial/grupos/miembros-grupo?group_id=${group.id}`;
            const isAdmin = Number(group.creador_id) === currentUserId || (group.admins || []).includes(currentUserName);
            document.getElementById("adminPanel").style.display = isAdmin ? "grid" : "none";
            document.getElementById("editGroupBtn").href = `/empireyoncarsocial/grupos/grupo-admin?group_id=${group.id}`;
            document.getElementById("viewRequestsBtn").href = `/empireyoncarsocial/grupos/grupo-admin?group_id=${group.id}#solicitudes`;
            document.getElementById("manageMembersBtn").href = `/empireyoncarsocial/grupos/grupo-admin?group_id=${group.id}#miembros`;
            renderPosts();
        }

        function renderPosts() {
            const list = document.getElementById("postList");
            const posts = group.posts || [];
            if (!posts.length) {
                list.innerHTML = '<div class="panel">Todavia no hay publicaciones en esta comunidad.</div>';
                return;
            }
            list.innerHTML = posts.map((post) => `
                <article class="post-card">
                    <div class="post-author">
                        <div class="avatar">${initials(post.author)}</div>
                        <div>
                            <div><strong>${post.author}</strong>${group.fixed_post_id === post.id ? " | Fijada" : ""}</div>
                            <div class="post-time">${post.fecha}</div>
                        </div>
                    </div>
                    <div class="post-text">${post.contenido}</div>
                    <div class="post-actions">
                        <button class="ghost-btn" type="button">Me gusta</button>
                        <button class="ghost-btn" type="button">Comentar</button>
                        <button class="ghost-btn" type="button">Compartir</button>
                    </div>
                </article>
            `).join("");
        }

        document.getElementById("publishPostBtn").addEventListener("click", () => {
            const contenido = document.getElementById("postContent").value.trim();
            if (!group || !contenido) return;
            const groups = getGroups();
            const target = groups.find((item) => item.id === group.id);
            target.posts = target.posts || [];
            target.posts.unshift({
                id: `post-${Date.now()}`,
                author: currentUserName,
                fecha: new Date().toLocaleString("es-ES"),
                contenido
            });
            saveGroups(groups);
            document.getElementById("postContent").value = "";
            document.getElementById("postMessage").textContent = "Publicacion creada.";
            renderGroup();
        });

        document.getElementById("pinPostBtn").addEventListener("click", () => {
            if (!group || !(group.posts || []).length) {
                document.getElementById("postMessage").textContent = "No hay publicaciones para fijar.";
                return;
            }
            const groups = getGroups();
            const target = groups.find((item) => item.id === group.id);
            target.fixed_post_id = target.posts[0].id;
            saveGroups(groups);
            document.getElementById("postMessage").textContent = "Se fijo la publicacion mas reciente.";
            renderGroup();
        });

        document.getElementById("bannerInput").addEventListener("change", () => {
            const file = document.getElementById("bannerInput").files[0];
            if (!file || !group) return;
            const reader = new FileReader();
            reader.onload = () => {
                const groups = getGroups();
                const target = groups.find((item) => item.id === group.id);
                target.banner = reader.result;
                saveGroups(groups);
                renderGroup();
            };
            reader.readAsDataURL(file);
        });

        renderGroup();
    </script>
</body>
</html>
