<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Empireyoncar Social</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        :root {
            --brand: #1a73e8;
            --brand-dark: #155fc0;
            --bg: #eff5ff;
            --panel: #ffffff;
            --line: #dce8fb;
            --text: #243247;
            --muted: #697b96;
            --success: #24b35a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #f6f9ff 0%, var(--bg) 100%);
            color: var(--text);
        }

        .navbar {
            width: 100%;
            background: var(--brand);
            padding: 12px 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .logo { font-size: 20px; font-weight: bold; }
        .nav-links { margin-left: 40px; display: flex; flex-wrap: wrap; gap: 18px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; }

        .layout {
            display: flex;
            justify-content: center;
            margin-top: 25px;
            gap: 20px;
            padding: 0 20px 30px;
        }

        .profile-container {
            width: 720px;
            background: var(--panel);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(24, 59, 112, 0.10);
        }

        .profile-hero {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 18px;
            align-items: center;
        }

        .avatar-wrap {
            position: relative;
            width: 128px;
            height: 128px;
        }

        .avatar-wrap img {
            width: 128px;
            height: 128px;
            border-radius: 50%;
            border: 4px solid var(--brand);
            object-fit: cover;
            background: #dce7fb;
        }

        .online-dot {
            position: absolute;
            right: 10px;
            bottom: 12px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--success);
            border: 3px solid white;
            display: none;
        }

        .online-dot.active { display: block; }

        .profile-main h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        .profile-bio {
            margin: 0 0 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        .profile-meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 12px;
        }

        .meta-item {
            padding: 10px 12px;
            border-radius: 12px;
            background: #f7faff;
            font-size: 14px;
        }

        .actions-col {
            display: grid;
            gap: 10px;
            align-content: start;
        }

        .btn, .ghost-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
        }

        .btn {
            background: var(--brand);
            color: white;
        }

        .btn:hover { background: var(--brand-dark); }

        .ghost-btn {
            background: #edf4ff;
            color: var(--brand);
        }

        .stats {
            display: flex;
            gap: 16px;
            margin: 20px 0;
        }

        .stats div {
            min-width: 120px;
            text-align: center;
            background: #f7faff;
            padding: 12px;
            border-radius: 12px;
        }

        .stats span {
            display: block;
            font-size: 18px;
            font-weight: bold;
            color: var(--brand);
        }

        .profile-form {
            display: none;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #f9fbff;
        }

        .profile-form.active { display: grid; }

        .profile-form input,
        .profile-form textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            font-family: inherit;
        }

        .profile-form textarea {
            grid-column: 1 / -1;
            min-height: 90px;
            resize: vertical;
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .section-title {
            margin: 22px 0 12px;
            font-size: 18px;
            color: var(--brand);
        }

        .posts-list {
            display: grid;
            gap: 16px;
        }

        .post-card {
            background: white;
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .post-author img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-time { font-size: 12px; color: var(--muted); }
        .post-text { white-space: pre-wrap; line-height: 1.5; }
        .post-image {
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 12px;
        }

        .post-link-card {
            display: block;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            background: #f8fbff;
        }

        .post-link-title { font-weight: 700; margin-bottom: 6px; }
        .post-link-description, .post-link-url { font-size: 13px; color: var(--muted); }

        .right-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .side-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--brand);
            margin-bottom: 10px;
        }

        .side-item, .status-message {
            background: #f7faff;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            color: var(--text);
        }

        @media (max-width: 1000px) {
            .layout {
                flex-direction: column;
                align-items: center;
            }
            .right-panel, .profile-container { width: 100%; max-width: 720px; }
            .profile-hero { grid-template-columns: 1fr; text-align: center; }
            .avatar-wrap { margin: 0 auto; }
            .actions-col { grid-auto-flow: row; justify-content: center; }
        }

        @media (max-width: 640px) {
            .profile-form, .profile-meta { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Empireyoncar Social</div>
        <div class="nav-links">
            <a href="home">Inicio</a>
            <a href="grupos">Grupos</a>
            <a href="chat">Chat</a>
            <a href="notificaciones">Notificaciones</a>
        </div>
    </div>

    <div class="layout">
        <div class="profile-container">
            <div class="profile-hero">
                <div class="avatar-wrap">
                    <img id="profileAvatar" src="https://i.pravatar.cc/200" alt="Foto de perfil">
                    <span class="online-dot" id="onlineDot"></span>
                </div>

                <div class="profile-main">
                    <h1 id="profileName">Cargando perfil...</h1>
                    <p class="profile-bio" id="profileBio">Consultando tus datos.</p>

                    <div class="profile-meta" id="profileDetails"></div>
                </div>

                <div class="actions-col">
                    <label class="ghost-btn" for="photoInput">Subir o cambiar foto</label>
                    <input id="photoInput" type="file" accept="image/*" hidden>
                    <button class="btn" id="toggleEditBtn" type="button">Editar perfil</button>
                    <div class="status-message" id="profileMessage"></div>
                </div>
            </div>

            <div class="stats">
                <div><span id="seguidores">0</span>Seguidores</div>
                <div><span id="siguiendo">0</span>Siguiendo</div>
            </div>

            <form class="profile-form" id="profileForm">
                <input id="editNombres" type="text" placeholder="Nombres">
                <input id="editApellidos" type="text" placeholder="Apellidos">
                <input id="editOficio" type="text" placeholder="Oficio">
                <input id="editWhatsapp" type="text" placeholder="WhatsApp">
                <input id="editPais" type="text" placeholder="Pais">
                <input id="editEstado" type="text" placeholder="Estado">
                <input id="editCiudad" type="text" placeholder="Ciudad">
                <textarea id="editBio" placeholder="Biografia"></textarea>
                <div class="form-actions">
                    <button class="ghost-btn" id="cancelEditBtn" type="button">Cancelar</button>
                    <button class="btn" type="submit">Guardar cambios</button>
                </div>
            </form>

            <h2 class="section-title">Mis publicaciones</h2>
            <div class="posts-list" id="postsList">
                <div class="post-card">Cargando publicaciones...</div>
            </div>
        </div>

        <div class="right-panel">
            <div class="side-box">
                <div class="side-title">Notificaciones</div>
                <div class="side-item">Tus alertas importantes apareceran aqui.</div>
            </div>

            <div class="side-box">
                <div class="side-title">Estado</div>
                <div class="side-item" id="profileState">Perfil conectado.</div>
            </div>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem("user_id");
        const profileForm = document.getElementById("profileForm");
        const profileMessage = document.getElementById("profileMessage");
        const photoInput = document.getElementById("photoInput");
        let currentUser = null;

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function formatDate(value) {
            if (!value) return "Ahora";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "Ahora";
            return date.toLocaleString("es-ES", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
        }

        function renderPost(post) {
            const imageHtml = post.imagen ? `<img class="post-image" src="${escapeHtml(post.imagen)}" alt="post">` : "";
            const linkHtml = post.link_url ? `
                <a class="post-link-card" href="${escapeHtml(post.link_url)}" target="_blank" rel="noreferrer">
                    <div class="post-link-title">${escapeHtml(post.link_title || post.link_url)}</div>
                    <div class="post-link-description">${escapeHtml(post.link_description || "Sin descripcion disponible.")}</div>
                    <div class="post-link-url">${escapeHtml(post.link_url)}</div>
                </a>
            ` : "";

            return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-author">
                            <img src="${escapeHtml(currentUser?.foto_url || "https://i.pravatar.cc/200")}" alt="Perfil">
                            <div>
                                <div>${escapeHtml((currentUser?.nombres || "") + " " + (currentUser?.apellidos || ""))}</div>
                                <div class="post-time">${escapeHtml(formatDate(post.fecha))}</div>
                            </div>
                        </div>
                    </div>
                    <div class="post-text">${escapeHtml(post.contenido || "")}</div>
                    ${imageHtml}
                    ${linkHtml}
                </div>
            `;
        }

        function fillForm(user) {
            document.getElementById("editNombres").value = user.nombres || "";
            document.getElementById("editApellidos").value = user.apellidos || "";
            document.getElementById("editOficio").value = user.oficio || "";
            document.getElementById("editWhatsapp").value = user.whatsapp || "";
            document.getElementById("editPais").value = user.pais || "";
            document.getElementById("editEstado").value = user.estado || "";
            document.getElementById("editCiudad").value = user.ciudad || "";
            document.getElementById("editBio").value = user.bio || "";
        }

        async function cargarPosts() {
            try {
                const response = await fetch(`/empireyoncarsocial/posts_api/api/post/usuario/${userId}`);
                const posts = await response.json();
                if (!response.ok) throw new Error();
                document.getElementById("postsList").innerHTML = posts.length
                    ? posts.map(renderPost).join("")
                    : '<div class="post-card">Todavia no has publicado nada.</div>';
            } catch {
                document.getElementById("postsList").innerHTML = '<div class="post-card">No se pudieron cargar tus publicaciones.</div>';
            }
        }

        async function cargarPerfil() {
            if (!userId) {
                window.location.href = "login";
                return;
            }

            try {
                const response = await fetch(`/empireyoncarsocial/usuarios/api/perfil/${userId}`);
                const user = await response.json();
                if (!response.ok) throw new Error();

                currentUser = user;
                const nombreCompleto = `${user.nombres || ""} ${user.apellidos || ""}`.trim();
                const ubicacion = [user.ciudad, user.estado, user.pais].filter(Boolean).join(", ");
                const verificado = user.verificado ? " ✔" : "";

                document.getElementById("profileName").textContent = `${nombreCompleto}${verificado}`;
                document.getElementById("profileBio").textContent = user.bio || user.oficio || "Sin biografia todavia.";
                document.getElementById("profileDetails").innerHTML = `
                    <div class="meta-item"><strong>Email:</strong> ${escapeHtml(user.email || "No disponible")}</div>
                    <div class="meta-item"><strong>Oficio:</strong> ${escapeHtml(user.oficio || "No indicado")}</div>
                    <div class="meta-item"><strong>Ubicacion:</strong> ${escapeHtml(ubicacion || "No indicada")}</div>
                    <div class="meta-item"><strong>WhatsApp:</strong> ${escapeHtml(user.whatsapp || "No indicado")}</div>
                `;
                document.getElementById("seguidores").textContent = user.seguidores ?? 0;
                document.getElementById("siguiendo").textContent = user.siguiendo ?? 0;
                document.getElementById("profileAvatar").src = user.foto_url || "https://i.pravatar.cc/200";
                document.getElementById("onlineDot").classList.add("active");
                fillForm(user);
                await cargarPosts();
            } catch {
                document.getElementById("profileName").textContent = "Error de conexion";
                document.getElementById("profileBio").textContent = "No se pudo consultar el servidor.";
            }
        }

        document.getElementById("toggleEditBtn").addEventListener("click", () => {
            profileForm.classList.toggle("active");
        });

        document.getElementById("cancelEditBtn").addEventListener("click", () => {
            profileForm.classList.remove("active");
            if (currentUser) fillForm(currentUser);
        });

        profileForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const payload = {
                user_id: Number(userId),
                nombres: document.getElementById("editNombres").value.trim(),
                apellidos: document.getElementById("editApellidos").value.trim(),
                oficio: document.getElementById("editOficio").value.trim(),
                whatsapp: document.getElementById("editWhatsapp").value.trim(),
                pais: document.getElementById("editPais").value.trim(),
                estado: document.getElementById("editEstado").value.trim(),
                ciudad: document.getElementById("editCiudad").value.trim(),
                bio: document.getElementById("editBio").value.trim()
            };

            profileMessage.textContent = "Guardando...";
            try {
                const response = await fetch("/empireyoncarsocial/usuarios/api/perfil/update", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || "No se pudo guardar");
                profileMessage.textContent = "Perfil actualizado.";
                profileForm.classList.remove("active");
                await cargarPerfil();
            } catch {
                profileMessage.textContent = "No se pudo actualizar el perfil.";
            }
        });

        photoInput.addEventListener("change", async () => {
            const file = photoInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("user_id", Number(userId));
            formData.append("foto", file);
            profileMessage.textContent = "Subiendo foto...";

            try {
                const response = await fetch("/empireyoncarsocial/usuarios/api/perfil/foto", {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || "No se pudo subir la foto");
                profileMessage.textContent = "Foto actualizada.";
                await cargarPerfil();
            } catch {
                profileMessage.textContent = "No se pudo actualizar la foto.";
            }
        });

        cargarPerfil();
    </script>
</body>
</html>
