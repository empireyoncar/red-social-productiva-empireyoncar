<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Empireyoncar Social</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        :root {
            --brand: #1a73e8;
            --brand-dark: #155fc0;
            --bg: #eff5ff;
            --panel: #fff;
            --line: #dce8fb;
            --text: #243247;
            --muted: #697b96;
            --success: #24b35a;
            --offline: #9aa7ba;
        }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: "Segoe UI", Arial, sans-serif; background: linear-gradient(180deg, #f6f9ff 0%, var(--bg) 100%); color: var(--text); }
        .navbar { width: 100%; background: var(--brand); padding: 12px 20px; color: white; display: flex; align-items: center; justify-content: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .logo { font-size: 20px; font-weight: bold; }
        .nav-links { margin-left: 40px; display: flex; flex-wrap: wrap; gap: 18px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; }
        .layout { display: grid; grid-template-columns: 280px minmax(0, 720px) 280px; justify-content: center; margin-top: 25px; gap: 20px; padding: 0 20px 30px; }
        .left-panel, .profile-container, .right-panel { min-width: 0; }
        .profile-container { background: var(--panel); padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(24,59,112,0.10); }
        .side-box { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .side-title { font-size: 16px; font-weight: 700; color: var(--brand); margin-bottom: 12px; }
        .side-item, .status-message { background: #f7faff; padding: 10px; border-radius: 10px; font-size: 13px; color: var(--text); }
        .left-panel, .right-panel { display: grid; gap: 20px; align-content: start; }
        .links-list { display: grid; gap: 10px; }
        .link-item {
            display: grid;
            gap: 6px;
            padding: 12px;
            border-radius: 12px;
            background: #f7faff;
            border: 1px solid var(--line);
        }
        .link-item a { color: var(--brand); text-decoration: none; overflow-wrap: anywhere; font-size: 13px; }
        .link-label { font-weight: 700; }
        .link-empty { font-size: 13px; color: var(--muted); background: #f7faff; border-radius: 12px; padding: 12px; }
        .links-editor { display: none; gap: 10px; margin-top: 12px; }
        .links-editor.active { display: grid; }
        .link-row { display: grid; gap: 8px; padding: 10px; background: #f7faff; border-radius: 12px; border: 1px solid var(--line); }
        .link-row input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); font-family: inherit; }
        .mini-btn, .btn, .ghost-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
        }
        .btn { background: var(--brand); color: white; }
        .btn:hover { background: var(--brand-dark); }
        .ghost-btn { background: #edf4ff; color: var(--brand); }
        .mini-btn { background: #edf4ff; color: var(--brand); padding: 8px 10px; font-size: 12px; }
        .profile-hero { display: grid; grid-template-columns: auto 1fr auto; gap: 18px; align-items: center; }
        .avatar-wrap { position: relative; width: 128px; height: 128px; }
        .avatar-wrap img { width: 128px; height: 128px; border-radius: 50%; border: 4px solid var(--brand); object-fit: cover; background: #dce7fb; }
        .online-dot { position: absolute; right: 10px; bottom: 12px; width: 18px; height: 18px; border-radius: 50%; background: var(--offline); border: 3px solid white; }
        .online-dot.online { background: var(--success); }
        .profile-main h1 { margin: 0 0 8px; font-size: 24px; }
        .profile-bio { margin: 0 0 12px; color: var(--muted); line-height: 1.5; }
        .profile-meta { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-top: 12px; }
        .meta-item { padding: 10px 12px; border-radius: 12px; background: #f7faff; font-size: 14px; }
        .actions-col { display: grid; gap: 10px; align-content: start; }
        .stats { display: flex; gap: 16px; margin: 20px 0; }
        .stats div { min-width: 120px; text-align: center; background: #f7faff; padding: 12px; border-radius: 12px; }
        .stats span { display: block; font-size: 18px; font-weight: bold; color: var(--brand); }
        .profile-form { display: none; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; margin-bottom: 20px; padding: 16px; border: 1px solid var(--line); border-radius: 14px; background: #f9fbff; }
        .profile-form.active { display: grid; }
        .profile-form input, .profile-form textarea { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); font-family: inherit; }
        .profile-form textarea { grid-column: 1 / -1; min-height: 90px; resize: vertical; }
        .form-actions { grid-column: 1 / -1; display: flex; gap: 10px; justify-content: flex-end; }
        .section-title { margin: 22px 0 12px; font-size: 18px; color: var(--brand); }
        .posts-list { display: grid; gap: 16px; }
        .post-card { background: white; padding: 18px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .post-author { display: flex; align-items: center; gap: 12px; }
        .post-author img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .post-time { font-size: 12px; color: var(--muted); }
        .post-text { white-space: pre-wrap; line-height: 1.5; }
        .post-image { width: 100%; max-height: 360px; object-fit: cover; border-radius: 12px; margin-top: 12px; }
        .post-link-card { display: block; text-decoration: none; color: inherit; border: 1px solid var(--line); border-radius: 12px; padding: 12px; margin-top: 12px; background: #f8fbff; }
        .post-link-title { font-weight: 700; margin-bottom: 6px; }
        .post-link-description, .post-link-url { font-size: 13px; color: var(--muted); }
        .post-menu, .comment-menu { position: relative; }
        .menu-trigger, .comment-trigger { border: none; background: #edf4ff; color: var(--brand); cursor: pointer; border-radius: 50%; }
        .menu-trigger { width: 36px; height: 36px; font-size: 18px; }
        .comment-trigger { width: 28px; height: 28px; font-size: 14px; }
        .menu-panel { display: none; position: absolute; top: 42px; right: 0; min-width: 140px; padding: 8px; border-radius: 12px; background: #fff; border: 1px solid var(--line); box-shadow: 0 10px 20px rgba(0,0,0,0.10); z-index: 3; }
        .menu-panel.active { display: grid; gap: 6px; }
        .menu-panel button { border: none; background: #f6f9ff; color: var(--text); border-radius: 8px; padding: 10px 12px; text-align: left; cursor: pointer; font-family: inherit; }
        .post-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .post-actions button { border: none; background: #edf4ff; color: var(--brand); border-radius: 10px; padding: 10px 14px; cursor: pointer; font-family: inherit; font-weight: 600; }
        .comments-box { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
        .comment-list { display: grid; gap: 8px; margin-bottom: 12px; }
        .comment-item { padding: 10px 12px; background: #f7faff; border-radius: 10px; font-size: 13px; line-height: 1.45; }
        .comment-row { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
        .comment-author { font-weight: 700; margin-bottom: 4px; }
        .comment-form { display: grid; gap: 8px; }
        .comment-form textarea { width: 100%; min-height: 70px; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-family: inherit; resize: vertical; }
        .comment-submit { justify-self: end; border: none; border-radius: 10px; padding: 10px 14px; background: var(--brand); color: #fff; cursor: pointer; font-family: inherit; font-weight: 600; }
        @media (max-width: 1200px) {
            .layout { grid-template-columns: minmax(0, 720px) 280px; }
            .left-panel { grid-column: 1 / -1; }
        }
        @media (max-width: 1000px) {
            .layout { grid-template-columns: 1fr; align-items: start; }
            .profile-hero { grid-template-columns: 1fr; text-align: center; }
            .avatar-wrap { margin: 0 auto; }
            .actions-col { justify-content: center; }
        }
        @media (max-width: 640px) {
            .profile-form, .profile-meta { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Empireyoncar Social</div>
        <div class="nav-links">
            <a href="/empireyoncarsocial/home">Inicio</a>
            <a href="/empireyoncarsocial/buscar">Buscar</a>
            <a href="/empireyoncarsocial/grupos/">Grupos</a>
            <a href="/empireyoncarsocial/chat">Chat</a>
            <a href="/empireyoncarsocial/notificaciones">Notificaciones</a>
        </div>
    </div>
    <div class="layout">
        <aside class="left-panel">
            <div class="side-box">
                <div class="side-title">Enlaces</div>
                <div class="links-list" id="linksList"></div>
                <div class="links-editor" id="linksEditor">
                    <div id="linksRows"></div>
                    <button class="mini-btn" id="addLinkBtn" type="button">Agregar enlace</button>
                </div>
            </div>
        </aside>
        <div class="profile-container">
            <div class="profile-hero">
                <div class="avatar-wrap">
                    <img id="profileAvatar" src="https://i.pravatar.cc/200" alt="Foto de perfil">
                    <span class="online-dot" id="onlineDot"></span>
                </div>
                <div class="profile-main">
                    <h1 id="profileName">Cargando perfil...</h1>
                    <p class="profile-bio" id="profileBio">Consultando tus datos.</p>
                    <div class="profile-meta" id="profileDetails"></div>
                </div>
                <div class="actions-col">
                    <label class="ghost-btn" for="photoInput" id="photoLabel">Subir o cambiar foto</label>
                    <input id="photoInput" type="file" accept="image/*" hidden>
                    <button class="btn" id="toggleEditBtn" type="button">Editar perfil</button>
                    <button class="btn" id="followBtn" type="button" hidden>Seguir</button>
                    <div class="status-message" id="profileMessage"></div>
                </div>
            </div>
            <div class="stats">
                <div><span id="seguidores">0</span>Seguidores</div>
                <div><span id="siguiendo">0</span>Siguiendo</div>
            </div>
            <form class="profile-form" id="profileForm">
                <input id="editNombres" type="text" placeholder="Nombres">
                <input id="editApellidos" type="text" placeholder="Apellidos">
                <input id="editOficio" type="text" placeholder="Oficio">
                <input id="editWhatsapp" type="text" placeholder="WhatsApp">
                <input id="editPais" type="text" placeholder="Pais">
                <input id="editEstado" type="text" placeholder="Estado">
                <input id="editCiudad" type="text" placeholder="Ciudad">
                <textarea id="editBio" placeholder="Biografia"></textarea>
                <div class="form-actions">
                    <button class="ghost-btn" id="cancelEditBtn" type="button">Cancelar</button>
                    <button class="btn" type="submit">Guardar cambios</button>
                </div>
            </form>
            <h2 class="section-title" id="postsHeading">Mis publicaciones</h2>
            <div class="posts-list" id="postsList"><div class="post-card">Cargando publicaciones...</div></div>
        </div>
        <aside class="right-panel">
            <div class="side-box">
                <div class="side-title">Notificaciones</div>
                <div class="side-item">Tus alertas importantes apareceran aqui.</div>
            </div>
            <div class="side-box">
                <div class="side-title">Estado</div>
                <div class="side-item" id="profileState">Consultando presencia...</div>
            </div>
        </aside>
    </div>
    <script>
        const currentUserId = Number(localStorage.getItem("user_id") || 0);
        const params = new URLSearchParams(window.location.search);
        const viewedUserId = Number(params.get("user_id") || currentUserId || 0);
        const isOwnProfile = currentUserId === viewedUserId;
        const profileForm = document.getElementById("profileForm");
        const profileMessage = document.getElementById("profileMessage");
        const photoInput = document.getElementById("photoInput");
        const followBtn = document.getElementById("followBtn");
        const linksEditor = document.getElementById("linksEditor");
        const linksRows = document.getElementById("linksRows");
        let currentUser = null;
        let presenceTimer = null;

        function escapeHtml(value) {
            return String(value || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
        }

        function formatDate(value) {
            if (!value) return "Ahora";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return "Ahora";
            return date.toLocaleString("es-ES", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
        }

        function renderLinks(links) {
            const list = document.getElementById("linksList");
            if (!Array.isArray(links) || !links.length) {
                list.innerHTML = '<div class="link-empty">Todavia no hay enlaces publicados.</div>';
                return;
            }
            list.innerHTML = links.map((link) => `
                <div class="link-item">
                    <div class="link-label">${escapeHtml(link.label || "Enlace")}</div>
                    <a href="${escapeHtml(link.url || "#")}" target="_blank" rel="noreferrer">${escapeHtml(link.url || "")}</a>
                </div>
            `).join("");
        }

        function createLinkRow(link = {}) {
            const wrapper = document.createElement("div");
            wrapper.className = "link-row";
            wrapper.innerHTML = `
                <input type="text" class="link-label-input" maxlength="80" placeholder="Nombre del enlace" value="${escapeHtml(link.label || "")}">
                <input type="url" class="link-url-input" maxlength="300" placeholder="https://..." value="${escapeHtml(link.url || "")}">
                <button class="mini-btn" type="button" data-remove-link>Quitar</button>
            `;
            linksRows.appendChild(wrapper);
        }

        function getLinksFromForm() {
            return Array.from(linksRows.querySelectorAll(".link-row")).map((row) => ({
                label: row.querySelector(".link-label-input").value.trim(),
                url: row.querySelector(".link-url-input").value.trim()
            })).filter((item) => item.url);
        }

        function syncLinksEditor(links) {
            linksRows.innerHTML = "";
            const source = Array.isArray(links) && links.length ? links : [{}, {}];
            source.forEach((link) => createLinkRow(link));
        }

        function updatePresenceUi(user) {
            const online = Boolean(user && user.online);
            const dot = document.getElementById("onlineDot");
            dot.classList.toggle("online", online);
            document.getElementById("profileState").textContent = online ? "Usuario en linea." : "Usuario desconectado.";
        }

        async function pingPresence() {
            if (!currentUserId) return;
            try {
                await fetch("/empireyoncarsocial/usuarios/api/presencia", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: currentUserId })
                });
            } catch {}
        }

        function startPresencePing() {
            if (presenceTimer) clearInterval(presenceTimer);
            pingPresence();
            presenceTimer = setInterval(pingPresence, 60000);
        }

        function renderComment(comment) {
            const ownComment = currentUserId === Number(comment.user_id);
            const authorName = `${comment.nombres || "Usuario"} ${comment.apellidos || ""}`.trim();
            const menuHtml = ownComment ? `
                <div class="comment-menu">
                    <button class="comment-trigger" type="button" data-comment-trigger data-comment-id="${comment.id}">&#8942;</button>
                    <div class="menu-panel" id="comment-menu-${comment.id}">
                        <button type="button" data-edit-comment="${comment.id}">Editar</button>
                        <button type="button" data-delete-comment="${comment.id}">Eliminar</button>
                    </div>
                </div>` : "";
            return `
                <div class="comment-item">
                    <div class="comment-row">
                        <div>
                            <div class="comment-author"><a href="/empireyoncarsocial/perfil?user_id=${comment.user_id}" style="color:inherit;text-decoration:none;">${escapeHtml(authorName)}</a></div>
                            <div>${escapeHtml(comment.comentario || "")}</div>
                        </div>
                        ${menuHtml}
                    </div>
                </div>`;
        }

        function renderPost(post) {
            const imageHtml = post.imagen ? `<img class="post-image" src="${escapeHtml(post.imagen)}" alt="post">` : "";
            const linkHtml = post.link_url ? `<a class="post-link-card" href="${escapeHtml(post.link_url)}" target="_blank" rel="noreferrer"><div class="post-link-title">${escapeHtml(post.link_title || post.link_url)}</div><div class="post-link-description">${escapeHtml(post.link_description || "Sin descripcion disponible.")}</div><div class="post-link-url">${escapeHtml(post.link_url)}</div></a>` : "";
            const commentsHtml = (post.comments || []).map(renderComment).join("");
            const ownPost = currentUserId === Number(post.user_id);
            const menuHtml = ownPost ? `
                <div class="post-menu">
                    <button class="menu-trigger" type="button" data-menu-trigger data-post-id="${post.id}">&#8942;</button>
                    <div class="menu-panel" id="profile-menu-${post.id}">
                        <button type="button" data-edit-post="${post.id}">Editar</button>
                        <button type="button" data-delete-post="${post.id}">Eliminar</button>
                    </div>
                </div>` : "";
            return `
                <div class="post-card" id="post-${post.id}">
                    <div class="post-header">
                        <div class="post-author">
                            <img src="${escapeHtml(post.foto_url || "https://i.pravatar.cc/200")}" alt="Perfil">
                            <div>
                                <div><a href="/empireyoncarsocial/perfil?user_id=${post.user_id}" style="color:inherit;text-decoration:none;font-weight:700;">${escapeHtml(`${post.nombres || "Usuario"} ${post.apellidos || ""}`.trim())}${post.verificado ? " ✔" : ""}</a></div>
                                <div class="post-time">${escapeHtml(formatDate(post.fecha))}</div>
                            </div>
                        </div>
                        ${menuHtml}
                    </div>
                    <div class="post-text">${escapeHtml(post.contenido || "")}</div>
                    ${imageHtml}
                    ${linkHtml}
                    <div class="post-actions">
                        <button type="button" data-like-post="${post.id}">Me gusta (${post.likes || 0})</button>
                        <button type="button" data-share-post="${post.id}">Compartir</button>
                    </div>
                    <div class="comments-box">
                        <div class="comment-list">${commentsHtml || '<div class="comment-item">Todavia no hay comentarios.</div>'}</div>
                        <form class="comment-form" data-comment-form="${post.id}">
                            <textarea name="comentario" placeholder="Escribe un comentario"></textarea>
                            <button class="comment-submit" type="submit">Publicar comentario</button>
                        </form>
                    </div>
                </div>`;
        }

        function fillForm(user) {
            document.getElementById("editNombres").value = user.nombres || "";
            document.getElementById("editApellidos").value = user.apellidos || "";
            document.getElementById("editOficio").value = user.oficio || "";
            document.getElementById("editWhatsapp").value = user.whatsapp || "";
            document.getElementById("editPais").value = user.pais || "";
            document.getElementById("editEstado").value = user.estado || "";
            document.getElementById("editCiudad").value = user.ciudad || "";
            document.getElementById("editBio").value = user.bio || "";
            syncLinksEditor(user.links || []);
        }

        async function cargarPosts() {
            try {
                const response = await fetch(`/empireyoncarsocial/posts_api/api/post/usuario/${viewedUserId}`);
                const posts = await response.json();
                if (!response.ok) throw new Error();
                const postsWithComments = await Promise.all(posts.map(async (post) => {
                    try {
                        const commentsResponse = await fetch(`/empireyoncarsocial/posts_api/api/post/comentarios/${post.id}`);
                        post.comments = commentsResponse.ok ? await commentsResponse.json() : [];
                    } catch {
                        post.comments = [];
                    }
                    return post;
                }));
                document.getElementById("postsList").innerHTML = posts.length ? postsWithComments.map(renderPost).join("") : '<div class="post-card">Todavia no hay publicaciones.</div>';
            } catch {
                document.getElementById("postsList").innerHTML = '<div class="post-card">No se pudieron cargar las publicaciones.</div>';
            }
        }

        async function cargarPerfil() {
            if (!currentUserId) {
                window.location.href = "login";
                return;
            }
            try {
                const response = await fetch(`/empireyoncarsocial/usuarios/api/perfil/${viewedUserId}?viewer_id=${currentUserId}`);
                const user = await response.json();
                if (!response.ok) throw new Error();
                currentUser = user;
                const nombreCompleto = `${user.nombres || ""} ${user.apellidos || ""}`.trim();
                const ubicacion = [user.ciudad, user.estado, user.pais].filter(Boolean).join(", ");
                const verificado = user.verificado ? " ✔" : "";
                document.getElementById("profileName").textContent = `${nombreCompleto}${verificado}`;
                document.getElementById("profileBio").textContent = user.bio || user.oficio || "Sin biografia todavia.";
                document.getElementById("profileDetails").innerHTML = `
                    <div class="meta-item"><strong>Email:</strong> ${escapeHtml(user.email || "No disponible")}</div>
                    <div class="meta-item"><strong>Oficio:</strong> ${escapeHtml(user.oficio || "No indicado")}</div>
                    <div class="meta-item"><strong>Ubicacion:</strong> ${escapeHtml(ubicacion || "No indicada")}</div>
                    <div class="meta-item"><strong>WhatsApp:</strong> ${escapeHtml(user.whatsapp || "No indicado")}</div>`;
                document.getElementById("seguidores").textContent = user.seguidores ?? 0;
                document.getElementById("siguiendo").textContent = user.siguiendo ?? 0;
                document.getElementById("profileAvatar").src = user.foto_url || "https://i.pravatar.cc/200";
                updatePresenceUi(user);
                renderLinks(user.links || []);
                document.getElementById("postsHeading").textContent = isOwnProfile ? "Mis publicaciones" : "Publicaciones";
                fillForm(user);
                document.getElementById("toggleEditBtn").hidden = !isOwnProfile;
                document.getElementById("photoLabel").hidden = !isOwnProfile;
                linksEditor.classList.toggle("active", isOwnProfile);
                profileForm.classList.remove("active");
                if (!isOwnProfile) {
                    followBtn.hidden = false;
                    followBtn.textContent = user.siguiendo_usuario ? "Siguiendo" : "Seguir";
                    followBtn.disabled = Boolean(user.siguiendo_usuario);
                } else {
                    followBtn.hidden = true;
                }
                await cargarPosts();
            } catch {
                document.getElementById("profileName").textContent = "Error de conexion";
                document.getElementById("profileBio").textContent = "No se pudo consultar el servidor.";
            }
        }

        document.getElementById("toggleEditBtn").addEventListener("click", () => {
            profileForm.classList.toggle("active");
        });

        document.getElementById("cancelEditBtn").addEventListener("click", () => {
            profileForm.classList.remove("active");
            if (currentUser) fillForm(currentUser);
        });

        document.getElementById("addLinkBtn").addEventListener("click", () => {
            createLinkRow();
        });

        linksRows.addEventListener("click", (event) => {
            const button = event.target.closest("[data-remove-link]");
            if (!button) return;
            button.closest(".link-row").remove();
        });

        profileForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const payload = {
                user_id: Number(currentUserId),
                nombres: document.getElementById("editNombres").value.trim(),
                apellidos: document.getElementById("editApellidos").value.trim(),
                oficio: document.getElementById("editOficio").value.trim(),
                whatsapp: document.getElementById("editWhatsapp").value.trim(),
                pais: document.getElementById("editPais").value.trim(),
                estado: document.getElementById("editEstado").value.trim(),
                ciudad: document.getElementById("editCiudad").value.trim(),
                bio: document.getElementById("editBio").value.trim(),
                links: getLinksFromForm()
            };
            profileMessage.textContent = "Guardando...";
            try {
                const response = await fetch("/empireyoncarsocial/usuarios/api/perfil/update", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || "No se pudo guardar");
                profileMessage.textContent = "Perfil actualizado.";
                await cargarPerfil();
            } catch {
                profileMessage.textContent = "No se pudo actualizar el perfil.";
            }
        });

        photoInput.addEventListener("change", async () => {
            const file = photoInput.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append("user_id", Number(currentUserId));
            formData.append("foto", file);
            profileMessage.textContent = "Subiendo foto...";
            try {
                const response = await fetch("/empireyoncarsocial/usuarios/api/perfil/foto", { method: "POST", body: formData });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || "No se pudo subir la foto");
                profileMessage.textContent = "Foto actualizada.";
                await cargarPerfil();
            } catch {
                profileMessage.textContent = "No se pudo actualizar la foto.";
            }
        });

        followBtn.addEventListener("click", async () => {
            try {
                const response = await fetch("/empireyoncarsocial/usuarios/api/usuarios/seguir", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ follower_id: currentUserId, followed_id: viewedUserId })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || "No se pudo seguir");
                profileMessage.textContent = "Ahora sigues a este usuario.";
                document.getElementById("seguidores").textContent = result.seguidores ?? document.getElementById("seguidores").textContent;
                followBtn.textContent = "Siguiendo";
                followBtn.disabled = true;
                await cargarPerfil();
            } catch (error) {
                profileMessage.textContent = error.message || "No se pudo seguir a este usuario.";
            }
        });

        document.getElementById("postsList").addEventListener("click", async (event) => {
            const trigger = event.target.closest("[data-menu-trigger]");
            if (trigger) {
                const panel = document.getElementById(`profile-menu-${trigger.dataset.postId}`);
                document.querySelectorAll(".menu-panel.active").forEach((node) => { if (node !== panel) node.classList.remove("active"); });
                panel.classList.toggle("active");
                return;
            }
            const commentTrigger = event.target.closest("[data-comment-trigger]");
            if (commentTrigger) {
                const panel = document.getElementById(`comment-menu-${commentTrigger.dataset.commentId}`);
                document.querySelectorAll(".menu-panel.active").forEach((node) => { if (node !== panel) node.classList.remove("active"); });
                panel.classList.toggle("active");
                return;
            }
            const deleteButton = event.target.closest("[data-delete-post]");
            if (deleteButton) {
                if (!confirm("Deseas eliminar esta publicacion?")) return;
                try {
                    const response = await fetch("/empireyoncarsocial/posts_api/api/post/eliminar", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ post_id: Number(deleteButton.dataset.deletePost), user_id: Number(currentUserId) })
                    });
                    if (!response.ok) throw new Error();
                    await cargarPosts();
                } catch {}
                return;
            }
            const editButton = event.target.closest("[data-edit-post]");
            if (editButton) {
                const postCard = document.getElementById(`post-${editButton.dataset.editPost}`);
                const currentText = postCard.querySelector(".post-text").textContent;
                const nuevoContenido = prompt("Editar publicacion", currentText);
                if (nuevoContenido === null) return;
                try {
                    const response = await fetch("/empireyoncarsocial/posts_api/api/post/editar", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ post_id: Number(editButton.dataset.editPost), user_id: Number(currentUserId), contenido: nuevoContenido.trim() })
                    });
                    if (!response.ok) throw new Error();
                    await cargarPosts();
                } catch {}
                return;
            }
            const likeButton = event.target.closest("[data-like-post]");
            if (likeButton) {
                try {
                    const response = await fetch("/empireyoncarsocial/posts_api/api/post/like", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ post_id: Number(likeButton.dataset.likePost), user_id: Number(currentUserId) })
                    });
                    if (!response.ok) throw new Error();
                    await cargarPosts();
                } catch {}
                return;
            }
            const shareButton = event.target.closest("[data-share-post]");
            if (shareButton) {
                const shareUrl = `${window.location.origin}/empireyoncarsocial/perfil?user_id=${viewedUserId}#post-${shareButton.dataset.sharePost}`;
                try {
                    await navigator.clipboard.writeText(shareUrl);
                    profileMessage.textContent = "Has copiado el enlace.";
                } catch {
                    profileMessage.textContent = shareUrl;
                }
                return;
            }
            const editCommentButton = event.target.closest("[data-edit-comment]");
            if (editCommentButton) {
                const commentItem = editCommentButton.closest(".comment-item");
                const currentText = commentItem.querySelector(".comment-row > div div:last-child").textContent;
                const nuevoComentario = prompt("Editar comentario", currentText);
                if (nuevoComentario === null) return;
                try {
                    const response = await fetch("/empireyoncarsocial/posts_api/api/post/comentario/editar", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ comment_id: Number(editCommentButton.dataset.editComment), user_id: Number(currentUserId), comentario: nuevoComentario.trim() })
                    });
                    if (!response.ok) throw new Error();
                    await cargarPosts();
                } catch {}
                return;
            }
            const deleteCommentButton = event.target.closest("[data-delete-comment]");
            if (deleteCommentButton) {
                if (!confirm("Deseas eliminar este comentario?")) return;
                try {
                    const response = await fetch("/empireyoncarsocial/posts_api/api/post/comentario/eliminar", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ comment_id: Number(deleteCommentButton.dataset.deleteComment), user_id: Number(currentUserId) })
                    });
                    if (!response.ok) throw new Error();
                    await cargarPosts();
                } catch {}
            }
        });

        document.getElementById("postsList").addEventListener("submit", async (event) => {
            const form = event.target.closest("[data-comment-form]");
            if (!form) return;
            event.preventDefault();
            const textarea = form.querySelector("textarea");
            const comentario = textarea.value.trim();
            if (!comentario) return;
            try {
                const response = await fetch("/empireyoncarsocial/posts_api/api/post/comentar", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ post_id: Number(form.dataset.commentForm), user_id: Number(currentUserId), comentario })
                });
                if (!response.ok) throw new Error();
                textarea.value = "";
                await cargarPosts();
            } catch {}
        });

        document.addEventListener("click", (event) => {
            if (event.target.closest(".post-menu, .comment-menu")) return;
            document.querySelectorAll(".menu-panel.active").forEach((panel) => panel.classList.remove("active"));
        });

        document.addEventListener("visibilitychange", () => {
            if (!document.hidden && isOwnProfile) pingPresence();
        });

        if (isOwnProfile) startPresencePing();
        cargarPerfil();
    </script>
</body>
</html>
