<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Empireyoncar Social</title>
    <link rel="stylesheet" href="/theme.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f0f4ff;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            background: #1a73e8;
            padding: 12px 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links {
            margin-left: 40px;
            display: flex;
        }

        .nav-links a {
            margin-right: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* CONTENEDOR PRINCIPAL */
        .chat-container {
            display: flex;
            width: 100%;
            height: calc(100vh - 60px);
        }

        /* LISTA DE CONVERSACIONES */
        .chat-list {
            width: 28%;
            background: white;
            border-right: 1px solid #d0d7e6;
            overflow-y: auto;
        }

        .chat-list h3 {
            padding: 15px;
            margin: 0;
            background: #e8f0ff;
            border-bottom: 1px solid #d0d7e6;
            color: #1a73e8;
        }

        .chat-user {
            padding: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: 0.2s;
        }

        .chat-user:hover {
            background: #f5f9ff;
        }

        .chat-user img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .chat-user .name {
            font-weight: bold;
            color: #333;
        }

        .chat-user .last-msg {
            font-size: 12px;
            color: #777;
        }

        /* PANEL DEL CHAT */
        .chat-panel {
            width: 72%;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .chat-header {
            padding: 15px;
            background: #e8f0ff;
            border-bottom: 1px solid #d0d7e6;
            font-weight: bold;
            color: #1a73e8;
        }

        /* MENSAJES */
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .msg {
            max-width: 70%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .msg.me {
            background: #1a73e8;
            color: white;
            margin-left: auto;
        }

        .msg.other {
            background: #f1f4ff;
            color: #333;
            margin-right: auto;
        }

        /* INPUT DE MENSAJE */
        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid #d0d7e6;
            background: #f7faff;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
        }

        .chat-input button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        .chat-input button:hover {
            background: #155fc0;
        }

        /* NOTIFICACIONES */
        .notification-box {
            position: fixed;
            top: 80px;
            right: 20px;
            background: #1a73e8;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none; /* Se activa con JS */
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">Empireyoncar Social</div>

        <div class="nav-links">
            <a href="home.html">Inicio</a>
            <a href="perfil.html">Perfil</a>
            <a href="grupos.html">Grupos</a>
        </div>
    </div>

    <!-- NOTIFICACIONES -->
    <div class="notification-box" id="notifBox">
        🔔 Nuevo mensaje recibido
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="chat-container">

        <!-- LISTA DE CONVERSACIONES -->
        <div class="chat-list">
            <h3>Mensajes</h3>

            <div class="chat-user">
                <img src="https://i.pravatar.cc/100" alt="">
                <div>
                    <div class="name">Juan Pérez</div>
                    <div class="last-msg">¿Cómo va todo?</div>
                </div>
            </div>

            <div class="chat-user">
                <img src="https://i.pravatar.cc/101" alt="">
                <div>
                    <div class="name">María López</div>
                    <div class="last-msg">Te envié los documentos</div>
                </div>
            </div>

        </div>

        <!-- PANEL DEL CHAT -->
        <div class="chat-panel">

            <div class="chat-header">Juan Pérez</div>

            <div class="messages">
                <div class="msg other">Hola, ¿cómo estás?</div>
                <div class="msg me">Todo bien, avanzando en mis proyectos.</div>
                <div class="msg other">Excelente, sigue así.</div>
            </div>

            <div class="chat-input">
                <input type="text" placeholder="Escribe un mensaje...">
                <button>Enviar</button>
            </div>

        </div>

    </div>

</body>
</html>
