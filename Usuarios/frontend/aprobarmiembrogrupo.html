<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprobar Miembros - Empireyoncar Social</title>
    <link rel="stylesheet" href="/theme.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f0f4ff;
        }

        .navbar {
            width: 100%;
            background: #1a73e8;
            padding: 12px 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links {
            margin-left: 40px;
            display: flex;
        }

        .nav-links a {
            margin-right: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .admin-container {
            width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .admin-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .request-box {
            background: #fff8e1;
            padding: 15px;
            border-left: 4px solid #ffb300;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .request-box strong {
            color: #b37400;
        }

        .admin-actions {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
        }

        .btn-approve {
            background: #2ecc71;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-reject {
            background: #e74c3c;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-approve:hover { background: #27ae60; }
        .btn-reject:hover { background: #c0392b; }

    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">Empireyoncar Social</div>

        <div class="nav-links">
            <a href="home.html">Inicio</a>
            <a href="perfil.html">Perfil</a>
            <a href="grupos.html">Grupos</a>
        </div>
    </div>

    <div class="admin-container">

        <div class="admin-title">Solicitudes de ingreso al grupo</div>

        <!-- Solicitud 1 -->
        <div class="request-box">
            <strong>Juan Pérez</strong> desea unirse al grupo.
            <div class="admin-actions">
                <button class="btn-approve">Aprobar</button>
                <button class="btn-reject">Rechazar</button>
            </div>
        </div>

        <!-- Solicitud 2 -->
        <div class="request-box">
            <strong>María López</strong> desea unirse al grupo.
            <div class="admin-actions">
                <button class="btn-approve">Aprobar</button>
                <button class="btn-reject">Rechazar</button>
            </div>
        </div>

    </div>

</body>
</html>
