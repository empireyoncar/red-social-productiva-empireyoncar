<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar personas - Empireyoncar Social</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        :root {
            --brand: #1a73e8;
            --brand-dark: #155fc0;
            --bg: #eef5ff;
            --panel: #fff;
            --line: #d8e5fb;
            --text: #233247;
            --muted: #697b96;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%); color: var(--text); }
        .navbar { width: 100%; background: var(--brand); padding: 12px 20px; color: white; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .logo { font-size: 20px; font-weight: bold; }
        .nav-links { margin-left: 40px; display: flex; gap: 18px; flex-wrap: wrap; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; }
        .page { max-width: 900px; margin: 28px auto; padding: 0 20px 30px; }
        .search-panel { background: var(--panel); border-radius: 16px; box-shadow: 0 8px 24px rgba(20,57,110,0.10); padding: 22px; }
        h1 { margin: 0 0 10px; color: var(--brand); }
        p { margin: 0 0 18px; color: var(--muted); }
        .search-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
        .search-row input { width: 100%; padding: 13px 14px; border: 1px solid var(--line); border-radius: 12px; font-family: inherit; }
        .btn { border: none; border-radius: 12px; padding: 12px 16px; cursor: pointer; font-family: inherit; font-weight: 600; background: var(--brand); color: #fff; }
        .results { display: grid; gap: 14px; margin-top: 20px; }
        .user-card { background: var(--panel); border-radius: 16px; box-shadow: 0 8px 24px rgba(20,57,110,0.10); padding: 16px; display: flex; justify-content: space-between; gap: 14px; align-items: center; }
        .user-main { display: flex; gap: 14px; align-items: center; }
        .user-main img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: #dce7fb; }
        .user-name { font-weight: 700; color: var(--text); text-decoration: none; }
        .user-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
        .message { margin-top: 12px; color: var(--muted); }
        @media (max-width: 640px) { .search-row, .user-card { grid-template-columns: 1fr; display: grid; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Empireyoncar Social</div>
        <div class="nav-links">
            <a href="/empireyoncarsocial/home">Inicio</a>
            <a href="/empireyoncarsocial/perfil">Mi perfil</a>
            <a href="/empireyoncarsocial/grupos/">Grupos</a>
            <a href="/empireyoncarsocial/chat">Chat</a>
            <a href="/empireyoncarsocial/notificaciones">Notificaciones</a>
        </div>
    </div>
    <div class="page">
        <div class="search-panel">
            <h1>Buscar personas</h1>
            <p>Busca usuarios por nombre y visita su perfil para seguirlos.</p>
            <div class="search-row">
                <input id="searchInput" type="text" placeholder="Escribe un nombre o apellido">
                <button class="btn" id="searchBtn" type="button">Buscar</button>
            </div>
            <div class="message" id="searchMessage"></div>
        </div>
        <div class="results" id="results"></div>
    </div>
    <script>
        const viewerId = localStorage.getItem("user_id");
        const results = document.getElementById("results");
        const searchMessage = document.getElementById("searchMessage");

        function escapeHtml(value) {
            return String(value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function renderUser(user) {
            return `
                <div class="user-card">
                    <div class="user-main">
                        <img src="${escapeHtml(user.foto_url || "https://i.pravatar.cc/200")}" alt="Perfil">
                        <div>
                            <a class="user-name" href="/empireyoncarsocial/perfil?user_id=${user.id}">${escapeHtml(`${user.nombres || ""} ${user.apellidos || ""}`.trim())}${user.verificado ? " &#10004;" : ""}</a>
                            <div class="user-meta">${escapeHtml(user.oficio || "Sin oficio")} | ${escapeHtml([user.ciudad, user.pais].filter(Boolean).join(", ") || "Ubicacion no indicada")}</div>
                        </div>
                    </div>
                    <button class="btn" type="button" data-view-user="${user.id}">Ver perfil</button>
                </div>
            `;
        }

        async function searchUsers() {
            const q = document.getElementById("searchInput").value.trim();
            if (!q) {
                searchMessage.textContent = "Escribe un nombre para buscar.";
                results.innerHTML = "";
                return;
            }
            searchMessage.textContent = "Buscando...";
            try {
                const response = await fetch(`/empireyoncarsocial/usuarios/api/usuarios/buscar?q=${encodeURIComponent(q)}&viewer_id=${encodeURIComponent(viewerId || "")}`);
                const users = await response.json();
                if (!response.ok) throw new Error();
                results.innerHTML = users.length ? users.map(renderUser).join("") : '<div class="user-card">No se encontraron personas con ese nombre.</div>';
                searchMessage.textContent = `${users.length} resultado(s).`;
            } catch {
                searchMessage.textContent = "No se pudo completar la busqueda.";
            }
        }

        document.getElementById("searchBtn").addEventListener("click", searchUsers);
        document.getElementById("searchInput").addEventListener("keydown", (event) => {
            if (event.key === "Enter") searchUsers();
        });
        results.addEventListener("click", (event) => {
            const button = event.target.closest("[data-view-user]");
            if (!button) return;
            window.location.href = `/empireyoncarsocial/perfil?user_id=${button.dataset.viewUser}`;
        });
    </script>
</body>
</html>
