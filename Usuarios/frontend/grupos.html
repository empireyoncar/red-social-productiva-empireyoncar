<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo - Empireyoncar Social</title>
    <link rel="stylesheet" href="/theme.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f0f4ff;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            background: #1a73e8;
            padding: 12px 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .navbar .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .navbar .nav-links {
            margin-left: 40px;
            display: flex;
        }

        .navbar .nav-links a {
            margin-right: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .navbar .nav-links a:hover {
            text-decoration: underline;
        }

        /* CONTENEDOR PRINCIPAL */
        .group-container {
            width: 650px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* HEADER DEL GRUPO */
        .group-header {
            text-align: center;
        }

        .group-header img {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            border: 4px solid #1a73e8;
        }

        .group-name {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            color: #333;
        }

        .group-description {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        /* CREAR PUBLICACIÓN */
        .create-post {
            background: #f7faff;
            padding: 20px;
            border-radius: 12px;
            margin-top: 25px;
            border-left: 4px solid #1a73e8;
        }

        .create-post textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            resize: none;
            font-size: 14px;
        }

        .create-post input[type="file"] {
            margin-top: 10px;
        }

        .btn-post {
            margin-top: 12px;
            padding: 12px 20px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }

        .btn-post:hover {
            background: #155fc0;
        }

        /* POSTS DEL GRUPO */
        .post-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-top: 20px;
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .post-header img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .post-header .name {
            font-weight: bold;
            color: #333;
        }

        .post-header .time {
            font-size: 12px;
            color: #777;
        }

        .post-text {
            font-size: 15px;
            color: #333;
            margin-bottom: 12px;
        }

        .post-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
        }

        .post-actions button {
            background: #e8f0ff;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .post-actions button:hover {
            background: #d6e4ff;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">Empireyoncar Social</div>

        <div class="nav-links">
            <a href="/home">Inicio</a>
            <a href="/perfil">Perfil</a>
        </div>
    </div>

    <!-- CONTENEDOR DEL GRUPO -->
    <div class="group-container">

        <!-- HEADER DEL GRUPO -->
        <div class="group-header">
            <img src="https://picsum.photos/200" alt="Grupo">
            <div class="group-name">Grupo de Productividad</div>
            <div class="group-description">
                Comunidad enfocada en mejorar la productividad diaria, compartir ideas y crecer juntos.
            </div>
        </div>

        <!-- CREAR PUBLICACIÓN -->
        <div class="create-post">
            <textarea placeholder="Escribe algo para el grupo..."></textarea>
            <input type="file" accept="image/*">
            <button class="btn-post">Publicar</button>
        </div>

        <!-- POST DE EJEMPLO -->
        <div class="post-card">
            <div class="post-header">
                <img src="https://i.pravatar.cc/100" alt="user">
                <div>
                    <div class="name">Carlos Mendoza</div>
                    <div class="time">Hace 3 horas</div>
                </div>
            </div>

            <div class="post-text">
                Hoy comparto una técnica que me ayudó a organizar mejor mis tareas. ¡Espero que les sirva!
            </div>

            <img class="post-image" src="https://picsum.photos/600/300" alt="post">

            <div class="post-actions">
                <button>👍 Me gusta</button>
                <button>💬 Comentar</button>
                <button>🔗 Compartir</button>
            </div>
        </div>

    </div>

</body>
</html>
