<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro · Empireyoncar</title>
  <style>
    :root{
      --bg:#0d1117;
      --panel:#161b22;
      --border:#30363d;
      --text:#c9d1d9;
      --muted:#8b949e;
      --btn-bg:#238636;
      --btn-bg-hover:#2ea043;
      --radius:6px;
    }
    *{box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto,Arial;color:var(--text)}
    body{
      margin:0;
      background:var(--bg);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }
    .wrap{width:100%;max-width:380px;text-align:center}
    .logo{
      width:64px;height:64px;border-radius:50%;background:#fff;margin:0 auto 20px;
      display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#000;
    }
    .card{
      background:var(--panel);border:1px solid var(--border);padding:28px;border-radius:var(--radius);text-align:left;
    }
    label{display:block;margin-bottom:6px;font-size:14px;color:var(--text)}
    input[type="text"],input[type="email"],input[type="password"]{
      width:100%;padding:10px;border-radius:var(--radius);border:1px solid var(--border);
      background:#0d1117;color:var(--text);margin-bottom:14px;font-size:14px;
    }
    input:focus{outline:none;border-color:#58a6ff;box-shadow:0 0 0 3px rgba(56,139,253,0.3)}
    .checkbox{display:flex;align-items:center;gap:10px;margin:10px 0 16px;font-size:13px;color:var(--muted)}
    .btn{
      width:100%;padding:10px;border:none;border-radius:var(--radius);background:var(--btn-bg);
      color:#fff;font-weight:600;cursor:pointer;font-size:15px;margin-top:6px;
    }
    .btn:hover{background:var(--btn-bg-hover)}
    .links{margin-top:16px;font-size:13px;text-align:center}
    .links a{color:#58a6ff;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">E</div>

    <div class="card">
      <h2 style="text-align:center;margin-bottom:18px">Crear cuenta</h2>

      <form method="post" autocomplete="off" novalidate>
        <label for="name">Nombre completo</label>
        <input id="name" name="name" type="text" required>

        <label for="username">Nombre de usuario</label>
        <input id="username" name="username" type="text" required>

        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" required>

        <label for="confirm">Confirmar contraseña</label>
        <input id="confirm" name="confirm" type="password" required>

        <label class="checkbox">
          <input id="terms" name="terms" type="checkbox" required>
          <span style="color:var(--muted);font-size:13px">Acepto los términos y condiciones</span>
        </label>

        <button class="btn" type="submit">Registrarse</button>
      </form>
    </div>

    <div class="links">
      <p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
    </div>
  </div>
</body>
</html>
