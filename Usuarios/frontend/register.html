<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empireyoncar Social - Registro</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #e8f0ff, #f5f8ff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container {
            background: #ffffff;
            width: 480px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.12);
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            color: #1a73e8;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 15px;
            color: #444;
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            background: #f9fbff;
            transition: 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1a73e8;
            background: #ffffff;
            box-shadow: 0 0 6px rgba(26,115,232,0.35);
        }

        .terms-box {
            margin-top: 20px;
            font-size: 13px;
            color: #333;
            background: #f0f6ff;
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid #1a73e8;
            line-height: 1.4;
        }

        .terms-box input {
            width: auto;
            margin-right: 6px;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-register:hover {
            background: #155fc0;
            transform: translateY(-1px);
        }

        .login-link {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .login-link a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="register-container">

        <div class="title">Empireyoncar Social</div>
        <div class="subtitle">Crea tu cuenta productiva</div>

        <form>

            <label>Nombres</label>
            <input type="text" required>

            <label>Apellidos</label>
            <input type="text" required>

            <label>Fecha de nacimiento</label>
            <input type="date" required>

            <label>Oficio</label>
            <input type="text" placeholder="Ej: Carpintero, Programador, Estudiante" required>

            <label>País</label>
            <input type="text" required>

            <label>Estado</label>
            <input type="text" required>

            <label>Ciudad o pueblo</label>
            <input type="text" required>

            <label>Teléfono WhatsApp (opcional pero necesario para verificación)</label>
            <input type="tel" placeholder="+34 600 000 000">

            <label>Correo Electrónico</label>
            <input type="email" required>

            <label>Repite el correo electrónico</label>
            <input type="email" required>

            <label>Contraseña</label>
            <input type="password" required>

            <label>Repetir contraseña</label>
            <input type="password" required>

            <div class="terms-box">
                <input type="checkbox" required>
                Acepto los términos y condiciones.  
                Empireyoncar Social es una red de Social Productividad que busca mejorar la vida cotidiana.  
                Está prohibido sexualizar contenido, hacer spam o publicar actividades ilícitas.
            </div>

            <button class="btn-register">Registrar</button>

        </form>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </div>

    </div>

</body>
</html>
