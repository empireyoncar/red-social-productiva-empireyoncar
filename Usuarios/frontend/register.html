<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empireyoncar Social - Registro</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .register-container {
            width: min(560px, 100%);
            padding: 32px;
            border-radius: 20px;
            background: rgba(12, 19, 34, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(16px);
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: #e5eefc;
            padding: 14px 15px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: rgba(79, 140, 255, 0.9);
            box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.14);
        }

        .terms-box {
            margin-top: 8px;
            font-size: 13px;
            color: #cbd5e1;
            background: rgba(255, 255, 255, 0.04);
            padding: 14px;
            border-radius: 14px;
            border-left: 4px solid #4f8cff;
            line-height: 1.5;
        }

        .terms-box input {
            width: auto;
            margin-right: 8px;
        }

        .btn-register {
            width: 100%;
            margin-top: 8px;
            border: none;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, #4f8cff, #7c5cff);
        }

        .btn-register:hover {
            filter: brightness(1.03);
        }

        .status {
            min-height: 22px;
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            color: #dbeafe;
        }

        .login-link {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }

        .login-link a {
            color: #dbeafe;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="title">Empireyoncar Social</div>
        <div class="subtitle">Crea tu cuenta productiva</div>

        <form id="registerForm">
            <div>
                <label for="nombres">Nombres</label>
                <input id="nombres" type="text" required>
            </div>

            <div>
                <label for="apellidos">Apellidos</label>
                <input id="apellidos" type="text" required>
            </div>

            <div>
                <label for="nacimiento">Fecha de nacimiento</label>
                <input id="nacimiento" type="date" required>
            </div>

            <div>
                <label for="oficio">Oficio</label>
                <input id="oficio" type="text" placeholder="Ej: Carpintero, Programador, Estudiante" required>
            </div>

            <div>
                <label for="pais">País</label>
                <input id="pais" type="text" required>
            </div>

            <div>
                <label for="estado">Estado</label>
                <input id="estado" type="text" required>
            </div>

            <div>
                <label for="ciudad">Ciudad o pueblo</label>
                <input id="ciudad" type="text" required>
            </div>

            <div>
                <label for="whatsapp">Teléfono WhatsApp</label>
                <input id="whatsapp" type="tel" placeholder="+34 600 000 000">
            </div>

            <div>
                <label for="email">Correo Electrónico</label>
                <input id="email" type="email" required>
            </div>

            <div>
                <label for="emailConfirm">Repite el correo electrónico</label>
                <input id="emailConfirm" type="email" required>
            </div>

            <div>
                <label for="password">Contraseña</label>
                <input id="password" type="password" required>
            </div>

            <div>
                <label for="passwordConfirm">Repetir contraseña</label>
                <input id="passwordConfirm" type="password" required>
            </div>

            <div class="terms-box">
                <input id="terms" type="checkbox" required>
                <label for="terms" style="display:inline; font-weight:400; color:#cbd5e1;">
                    Acepto los términos y condiciones. Empireyoncar Social es una red de productividad.
                </label>
            </div>

            <button class="btn-register" type="submit">Registrar</button>
        </form>

        <div id="registerStatus" class="status"></div>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="login">Inicia sesión</a>
        </div>
    </div>

    <script>
        const form = document.getElementById("registerForm");
        const statusBox = document.getElementById("registerStatus");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const emailConfirm = document.getElementById("emailConfirm").value.trim();
            const password = document.getElementById("password").value;
            const passwordConfirm = document.getElementById("passwordConfirm").value;

            if (email !== emailConfirm) {
                statusBox.textContent = "Los correos no coinciden.";
                return;
            }

            if (password !== passwordConfirm) {
                statusBox.textContent = "Las contraseñas no coinciden.";
                return;
            }

            const payload = {
                nombres: document.getElementById("nombres").value.trim(),
                apellidos: document.getElementById("apellidos").value.trim(),
                nacimiento: document.getElementById("nacimiento").value,
                oficio: document.getElementById("oficio").value.trim(),
                pais: document.getElementById("pais").value.trim(),
                estado: document.getElementById("estado").value.trim(),
                ciudad: document.getElementById("ciudad").value.trim(),
                whatsapp: document.getElementById("whatsapp").value.trim(),
                email,
                password,
            };

            try {
                const response = await fetch("/empireyoncarsocial/usuarios/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                const data = await response.json();

                if (!response.ok) {
                    statusBox.textContent = data.error || "No se pudo registrar.";
                    return;
                }

                statusBox.textContent = "Registro exitoso. Ya puedes iniciar sesión.";
                form.reset();
            } catch {
                statusBox.textContent = "Error de conexión con el servidor.";
            }
        });
    </script>
</body>
</html>
