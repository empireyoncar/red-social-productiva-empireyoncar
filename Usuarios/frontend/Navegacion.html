<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inicio · Empireyoncar</title>

  <style>
    :root{
      --bg:#0d1117;
      --panel:#161b22;
      --border:#30363d;
      --text:#c9d1d9;
      --muted:#8b949e;
      --btn-bg:#238636;
      --btn-bg-hover:#2ea043;
      --radius:6px;
    }

    *{box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto,Arial;color:var(--text)}
    body{
      margin:0;
      background:var(--bg);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      background:var(--panel);
      border-bottom:1px solid var(--border);
      padding:14px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:600;
    }

    .logo{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#000;
      font-weight:800;
      font-size:20px;
    }

    .logout{
      background:none;
      border:1px solid var(--border);
      padding:6px 12px;
      border-radius:var(--radius);
      color:var(--text);
      cursor:pointer;
      font-size:14px;
    }

    .logout:hover{
      background:#21262d;
    }

    main{
      width:100%;
      max-width:760px;
      margin:0 auto;
      padding:20px;
    }

    .new-post{
      background:var(--panel);
      border:1px solid var(--border);
      padding:16px;
      border-radius:var(--radius);
      margin-bottom:20px;
    }

    textarea{
      width:100%;
      background:#0d1117;
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:10px;
      color:var(--text);
      resize:none;
      height:80px;
      font-size:14px;
    }

    textarea:focus{
      outline:none;
      border-color:#58a6ff;
      box-shadow:0 0 0 3px rgba(56,139,253,0.3);
    }

    .btn{
      margin-top:10px;
      padding:10px 14px;
      border:none;
      border-radius:var(--radius);
      background:var(--btn-bg);
      color:#fff;
      font-weight:600;
      cursor:pointer;
      font-size:14px;
    }

    .btn:hover{
      background:var(--btn-bg-hover);
    }

    .post{
      background:var(--panel);
      border:1px solid var(--border);
      padding:16px;
      border-radius:var(--radius);
      margin-bottom:20px;
    }

    .post-header{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .avatar{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#30363d;
    }

    .username{
      font-weight:600;
    }

    .post-text{
      margin:10px 0;
      line-height:1.5;
    }

    .post img, .post video{
      width:100%;
      border-radius:var(--radius);
      margin-top:10px;
      border:1px solid var(--border);
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="logo">E</div>
      Empireyoncar Social Productiva
    </div>

    <form action="{{ url_for('logout') }}" method="get">
      <button class="logout">Cerrar sesión</button>
    </form>
  </header>

  <!-- MAIN -->
  <main>

    <!-- CREAR PUBLICACIÓN -->
    <div class="new-post">
      <h3 style="margin-top:0;font-size:16px;color:var(--muted)">Crear publicación</h3>

      <form method="post" enctype="multipart/form-data">
        <textarea name="content" placeholder="¿Qué estás pensando?" required></textarea>

        <input type="file" name="media" accept="image/*,video/*" style="margin-top:10px;color:var(--muted)">

        <button class="btn" type="submit">Publicar</button>
      </form>
    </div>

    <!-- EJEMPLO DE PUBLICACIÓN -->
    <div class="post">
      <div class="post-header">
        <div class="avatar"></div>
        <div>
          <div class="username">@usuario_demo</div>
          <div style="font-size:12px;color:var(--muted)">Hace 2 horas</div>
        </div>
      </div>

      <div class="post-text">
        Esta es una publicación de ejemplo. Aquí aparecerán textos, imágenes o videos subidos por los usuarios.
      </div>

      <img src="https://via.placeholder.com/700x350" alt="Imagen de ejemplo">
    </div>

  </main>

</body>
</html>
