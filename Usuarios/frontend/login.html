<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Empireyoncar Social</title>
    <style>
        :root {
            --bg-color: #050a18;
            --panel-bg: rgba(13, 25, 48, 0.7);
            --accent-blue: #00d2ff;
            --accent-purple: #9d50bb;
            --text-main: #ffffff;
            --text-muted: #8a99b5;
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(0, 210, 255, 0.2);
            --glow: 0 0 20px rgba(0, 210, 255, 0.3);
            --success: #00ff88;
            --error: #fda4af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(157, 80, 187, 0.1) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
            padding: 20px;
        }

        .bg-decoration {
            position: absolute;
            inset: 0;
            z-index: -1;
            opacity: 0.55;
        }

        .node {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .login-card {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), var(--glow);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0;
            margin-bottom: 0;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-pass {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-pass:hover,
        .footer-links a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 210, 255, 0.3);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .status {
            min-height: 22px;
            margin-top: 16px;
            font-size: 14px;
            color: var(--accent-blue);
            text-align: center;
        }

        .status.error {
            color: var(--error);
        }

        .status.success {
            color: var(--success);
        }

        .footer-links {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 8px var(--success);
        }

        @media (max-width: 520px) {
            .login-card {
                padding: 28px 22px;
                border-radius: 20px;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration" id="nodes"></div>

    <div class="login-card">
        <div class="header">
            <div class="logo">EMPIREYONCAR SOCIAL</div>
            <div class="subtitle">
                <span class="status-dot"></span>
                Red Social productiva, amantes del desarrollo personal en todas las areas.
            </div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electronico</label>
                <input type="email" id="email" placeholder="nombre@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contrasena</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe"> Recordarme
                </label>
                <a href="#" class="forgot-pass">Olvidaste tu contrasena?</a>
            </div>

            <button type="submit" class="btn-login">Iniciar sesion</button>
        </form>

        <div id="loginStatus" class="status"></div>

        <div class="footer-links">
            No tienes una cuenta? <a href="register">Registrate ahora</a>
        </div>
    </div>

    <script>
        const nodesContainer = document.getElementById("nodes");
        for (let i = 0; i < 20; i++) {
            const node = document.createElement("div");
            node.className = "node";
            node.style.left = Math.random() * 100 + "%";
            node.style.top = Math.random() * 100 + "%";
            node.style.opacity = Math.random();
            nodesContainer.appendChild(node);
        }

        const loginForm = document.getElementById("loginForm");
        const loginStatus = document.getElementById("loginStatus");
        const rememberMe = document.getElementById("rememberMe");

        function setStatus(message, type = "") {
            loginStatus.textContent = message;
            loginStatus.className = `status${type ? ` ${type}` : ""}`;
        }

        const rememberedEmail = localStorage.getItem("remembered_email");
        if (rememberedEmail) {
            document.getElementById("email").value = rememberedEmail;
            rememberMe.checked = true;
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            setStatus("Validando acceso...");

            try {
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value;
                const response = await fetch("/empireyoncarsocial/usuarios/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    setStatus(data.error || "No se pudo iniciar sesion.", "error");
                    return;
                }

                localStorage.setItem("user_id", data.user_id);
                if (rememberMe.checked) {
                    localStorage.setItem("remembered_email", email);
                } else {
                    localStorage.removeItem("remembered_email");
                }

                setStatus("Acceso correcto. Redirigiendo...", "success");
                window.location.href = "home";
            } catch {
                setStatus("Error de conexion con el servidor.", "error");
            }
        });
    </script>
</body>
</html>
