<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empireyoncar Social - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #e8f0ff, #f5f8ff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #ffffff;
            width: 380px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.12);
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 15px;
            color: #444;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            background: #f9fbff;
            color: #222;
            transition: 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #1a73e8;
            background: #ffffff;
            box-shadow: 0 0 6px rgba(26,115,232,0.35);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: #155fc0;
            transform: translateY(-1px);
        }

        .status {
            min-height: 20px;
            margin-top: 12px;
            font-size: 14px;
            color: #1a73e8;
        }

        .register-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .register-link a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="title">Empireyoncar Social</div>
        <div class="subtitle">Bienvenido a la Red Social Productiva</div>

        <form id="loginForm">
            <input id="email" type="email" placeholder="Correo electrónico" required>
            <input id="password" type="password" placeholder="Contraseña" required>
            <button class="btn-login" type="submit">Entrar</button>
        </form>

        <div id="loginStatus" class="status"></div>

        <div class="register-link">
            ¿No tienes cuenta? <a href="register">Regístrate aquí</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById("loginForm");
        const loginStatus = document.getElementById("loginStatus");

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            try {
                const response = await fetch("/empireyoncarsocial/usuarios/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value.trim(),
                        password: document.getElementById("password").value,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    loginStatus.textContent = data.error || "No se pudo iniciar sesión.";
                    return;
                }

                localStorage.setItem("user_id", data.user_id);
                window.location.href = "home";
            } catch {
                loginStatus.textContent = "Error de conexión con el servidor.";
            }
        });
    </script>
</body>
</html>
