<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empireyoncar Social - Login</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #ffffff;
            width: 350px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #333;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            box-sizing: border-box;
            background: white;
            color: #222;
        }

        input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 4px rgba(26,115,232,0.4);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #1664c4;
        }

        .status {
            min-height: 20px;
            margin-top: 12px;
            font-size: 14px;
            color: #1a73e8;
        }

        .register-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .register-link a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="title">Empireyoncar Social</div>
        <div class="subtitle">Bienvenido a la Red Social Productiva</div>

        <form id="loginForm">
            <input id="email" type="email" placeholder="Correo electrónico" required>
            <input id="password" type="password" placeholder="Contraseña" required>
            <button class="btn-login" type="submit">Entrar</button>
        </form>

        <div id="loginStatus" class="status"></div>

        <div class="register-link">
            ¿No tienes cuenta? <a href="register">Regístrate aquí</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById("loginForm");
        const loginStatus = document.getElementById("loginStatus");

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            try {
                const response = await fetch("/empireyoncarsocial/usuarios/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value.trim(),
                        password: document.getElementById("password").value,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    loginStatus.textContent = data.error || "No se pudo iniciar sesión.";
                    return;
                }

                localStorage.setItem("user_id", data.user_id);
                window.location.href = "home";
            } catch {
                loginStatus.textContent = "Error de conexión con el servidor.";
            }
        });
    </script>
</body>
</html>
