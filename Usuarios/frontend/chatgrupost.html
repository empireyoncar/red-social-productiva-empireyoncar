<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat del Grupo</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #eef3ff;
        }

        .navbar {
            width: 100%;
            background: #1a73e8;
            padding: 12px 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .layout {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* LISTA DE MIEMBROS */
        .members-panel {
            width: 260px;
            background: white;
            border-right: 1px solid #dce3f7;
            padding: 15px;
            overflow-y: auto;
        }

        .member {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            background: #f7faff;
        }

        .member img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .member-name {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        /* CHAT */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f0f4ff;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .msg {
            max-width: 60%;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .msg.me {
            background: #1a73e8;
            color: white;
            margin-left: auto;
        }

        .msg.other {
            background: white;
            color: #333;
            border: 1px solid #dce3f7;
        }

        /* INPUT */
        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #dce3f7;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #cbd6f0;
            font-size: 14px;
        }

        .input-area button {
            margin-left: 10px;
            padding: 12px 18px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .input-area button:hover {
            background: #155fc0;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .members-panel {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">Chat del Grupo</div>

    <div class="layout">

        <!-- PANEL DE MIEMBROS -->
        <div class="members-panel">
            <div class="member">
                <img src="https://i.pravatar.cc/100">
                <div class="member-name">Juan Pérez</div>
            </div>

            <div class="member">
                <img src="https://i.pravatar.cc/101">
                <div class="member-name">María López</div>
            </div>

            <div class="member">
                <img src="https://i.pravatar.cc/102">
                <div class="member-name">Carlos Mendoza</div>
            </div>
        </div>

        <!-- CHAT -->
        <div class="chat-container">

            <div class="messages" id="messages">
                <div class="msg other">Bienvenido al chat del grupo 👋</div>
                <div class="msg me">Gracias, listo para comenzar.</div>
            </div>

            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Escribe un mensaje...">
                <button onclick="sendMessage()">Enviar</button>
            </div>

        </div>

    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById("msgInput");
            const text = input.value.trim();
            if (text === "") return;

            const msgBox = document.getElementById("messages");

            const bubble = document.createElement("div");
            bubble.className = "msg me";
            bubble.textContent = text;

            msgBox.appendChild(bubble);
            msgBox.scrollTop = msgBox.scrollHeight;

            input.value = "";
        }
    </script>

</body>
</html>
