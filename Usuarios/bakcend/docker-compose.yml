version: "3.9"

services:
  web:
    build: .
    container_name: empireyoncar_web
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: "cambia_esta_clave_super_secreta"
      DATABASE_URL: "postgresql+psycopg2://empireyoncar:empireyoncar@db:5432/empireyoncar_db"
      FLASK_ENV: "development"
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: empireyoncar_db
    environment:
      POSTGRES_DB: "empireyoncar_db"
      POSTGRES_USER: "empireyoncar"
      POSTGRES_PASSWORD: "empireyoncar"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: